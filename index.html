<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KOPILOT — Analyse Financière IA</title>
<style>
:root{--N:#0A1E6E;--B:#3B82F6;--C:#00C2CB;--G:#22C55E;--R:#EF4444;--A:#F59E0B}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#010B1F;font-family:'Segoe UI',system-ui,sans-serif;color:#E2E8F0;min-height:100vh}
input,textarea,button,select{font-family:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
#topbar{background:var(--N);height:52px;display:flex;align-items:center;padding:0 20px;gap:10px;border-bottom:1px solid rgba(255,255,255,0.07);position:sticky;top:0;z-index:100}
#topbar .logo{color:var(--C);font-weight:800;font-size:18px;letter-spacing:-0.5px}
#topbar .sub{color:rgba(255,255,255,0.3);font-size:11px}
#main{max-width:860px;margin:0 auto;padding:24px 16px}
#stepper{display:flex;align-items:center;justify-content:center;margin-bottom:24px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px}
.step-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;flex-shrink:0}
.step-label{font-size:9px;margin-top:3px;text-align:center;white-space:nowrap}
.step-col{display:flex;flex-direction:column;align-items:center;width:54px;flex-shrink:0}
.step-line{flex:1;height:1px;margin:0 2px;margin-bottom:14px;min-width:8px}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:22px 20px;margin-bottom:16px}
.card-title{font-size:18px;font-weight:700;color:white;margin-bottom:4px}
.card-sub{font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:18px}
.btn{background:linear-gradient(135deg,var(--B),var(--N));border:none;color:white;padding:10px 22px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;transition:opacity 0.15s}
.btn:disabled{opacity:0.35;cursor:not-allowed}
.btn-g{background:transparent;border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.6);padding:9px 18px;border-radius:8px;font-weight:500;font-size:12px;cursor:pointer}
.btn-sm{padding:5px 10px;font-size:11px}
.inp{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:9px 12px;color:white;font-size:13px;width:100%;outline:none}
.inp:focus{border-color:var(--B)}
select.inp option{background:#1a2a5e;color:white}
textarea.inp{min-height:80px;resize:vertical}
.lbl{font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:0.5px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(max-width:580px){.g3{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}}
.prof-card{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:14px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all 0.15s}
.prof-card.active{background:rgba(59,130,246,0.14);border-color:var(--B)}
.prof-icon{font-size:22px;flex-shrink:0}
.prof-name{font-size:12px;font-weight:600;color:white}
.prof-desc{font-size:10px;color:rgba(255,255,255,0.35);margin-top:1px}
.file-slot{background:rgba(255,255,255,0.025);border:1px dashed rgba(255,255,255,0.1);border-radius:10px;padding:14px;cursor:pointer;text-align:center;transition:all 0.15s}
.file-slot.loaded{background:rgba(34,197,94,0.07);border-color:var(--G)}
.file-slot-icon{font-size:20px;margin-bottom:4px}
.file-slot-name{font-size:11px;font-weight:600;color:white;margin-bottom:2px}
.file-slot-status{font-size:10px;color:rgba(255,255,255,0.3);word-break:break-all}
.file-slot.loaded .file-slot-status{color:var(--G)}
.ent-block{background:rgba(255,255,255,0.025);border-radius:8px;padding:14px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.06)}
.ent-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.kpi-card{background:rgba(255,255,255,0.04);border-radius:8px;padding:12px 14px;border-left:3px solid}
.kpi-label{font-size:9px;color:rgba(255,255,255,0.38);text-transform:uppercase;letter-spacing:0.5px}
.kpi-val{font-size:15px;font-weight:700;margin-top:3px}
.alert{background:rgba(239,68,68,0.09);border:1px solid rgba(239,68,68,0.2);border-radius:7px;padding:7px 11px;font-size:11px;color:#FCA5A5;margin-top:6px}
/* QUESTIONNAIRE */
.q-section{margin-bottom:20px}
.q-section-title{font-size:13px;font-weight:700;color:var(--C);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid rgba(0,194,203,0.2)}
.q-block{margin-bottom:14px}
.q-label{font-size:12px;color:rgba(255,255,255,0.75);margin-bottom:7px;display:block;line-height:1.4}
.q-options{display:flex;gap:8px;flex-wrap:wrap}
.q-opt{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:7px 13px;font-size:12px;color:rgba(255,255,255,0.6);cursor:pointer;transition:all 0.15s}
.q-opt.sel{background:rgba(59,130,246,0.18);border-color:var(--B);color:white;font-weight:600}
/* LOADING */
.load-wrap{text-align:center;padding:52px 20px}
.load-icon{font-size:38px;margin-bottom:14px;display:inline-block;animation:spin 2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.progress-bar{height:4px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;max-width:320px;margin:20px auto 8px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--B),var(--C));border-radius:2px;transition:width 0.6s}
/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.tab-btn{border-color:rgba(255,255,255,0.1)!important;color:rgba(255,255,255,0.4)!important;font-weight:400!important}
.tab-btn.active{border-color:var(--B)!important;color:white!important;font-weight:700!important}
/* IA */
#ia-history{background:rgba(0,0,0,0.2);border-radius:8px;padding:12px;min-height:160px;max-height:280px;overflow-y:auto;margin-bottom:10px}
.ia-msg{margin-bottom:8px}
.ia-msg.user{text-align:right}
.ia-bubble{display:inline-block;max-width:82%;border-radius:8px;padding:8px 11px;font-size:12px;color:white;white-space:pre-wrap;line-height:1.5}
.ia-msg.user .ia-bubble{background:rgba(59,130,246,0.18)}
.ia-msg.assistant .ia-bubble{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.06)}
.ia-input-row{display:flex;gap:6px}
.empty-ia{color:rgba(255,255,255,0.2);font-size:11px;text-align:center;padding:40px 0}
.flex-between{display:flex;justify-content:space-between;align-items:center;margin-top:16px;gap:8px}
.ent-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.error-box{background:rgba(239,68,68,0.09);border:1px solid rgba(239,68,68,0.2);border-radius:7px;padding:9px 12px;font-size:12px;color:#FCA5A5;margin-top:10px}
.pappers-info{margin-top:6px;font-size:10px;color:var(--C)}
/* RAPPORT affiché inline */
#rapport-container{background:white;border-radius:12px;overflow:auto;max-height:75vh;padding:0}
#rapport-container iframe{width:1280px;min-height:720px;border:none;transform-origin:top left;display:block}
.rapport-zoom{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.rapport-zoom span{font-size:11px;color:rgba(255,255,255,0.4)}
</style>

// EXTRACTION SIREN DEPUIS FEC
// ══════════════════════════════════════════
function extractSirenFromFEC(text, filename){
  // Méthode 0 : SIREN dans le nom du fichier (ex: 923124820FECPROVISOIRE...)
  if(filename){
    const mFn=filename.match(/^(\d{9})/);
    if(mFn)return mFn[1];
    // Aussi chercher pattern SIREN n'importe où dans le nom
    const mFn2=filename.match(/\b(\d{9})\b/);
    if(mFn2)return mFn2[1];
  }

  const lines=text.split(/\r?\n/).filter(Boolean);
  if(!lines.length)return null;

  // Méthode 1 : colonne "siren" dans l'en-tête
  const sep=lines[0].includes("|")?"|":lines[0].includes(";")?";":"\t";
  const cols=lines[0].split(sep).map(c=>c.trim().replace(/^"|"$/g,"").toLowerCase().replace(/\s/g,""));
  const sirenColIdx=cols.findIndex(c=>c==="siren"||c==="numsiren"||c==="numerosiren");
  if(sirenColIdx>=0&&lines.length>1){
    const val=lines[1].split(sep)[sirenColIdx]?.trim().replace(/^"|"$/g,"").replace(/\s/g,"");
    if(val&&/^\d{9}$/.test(val))return val;
  }

  // Méthode 2 : premières lignes, pattern 9 chiffres isolé (hors dates et comptes)
  const sirenPattern=/\b(\d{9})\b/g;
  for(let i=0;i<Math.min(20,lines.length);i++){
    const matches=[...lines[i].matchAll(sirenPattern)];
    for(const m of matches){
      const v=m[1];
      if(v[0]!=="0"&&!v.startsWith("20")&&!v.startsWith("19")&&!v.startsWith("40")&&!v.startsWith("41")){
        return v;
      }
    }
  }
  return null;
}

async function fetchPappers(entIdx,siren){
  if(!siren||!/^\d{9}$/.test(siren.replace(/\s/g,"")))return;
  siren=siren.replace(/\s/g,"");
  ST.ents[entIdx]._pappersLoading=true;
  ST.ents[entIdx]._pappersError=false;
  render();

  const timeout=ms=>new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),ms));

  const PAPPERS_KEY="ffa11010fe640e411565f4f828d521a58c2953a23457b19c";

  // 1. Pappers API officielle avec clé (source principale)
  try{
    const r=await Promise.race([
      fetch("https://api.pappers.fr/v2/entreprise?siren="+siren+"&api_token="+PAPPERS_KEY),
      timeout(6000)
    ]);
    if(r.ok){
      const d=await r.json();

        ST.ents[entIdx].name=nom;

  }catch(err){console.warn("API gouv error:",err.message);}

  // Fallback Pappers suggestions (sans clé)
  try{
    const r2=await Promise.race([
      fetch("https://suggestions.pappers.fr/v2?q="+siren+"&longueur=1&cibles=siren"),

// PARSE SILAE — Structure exacte confirmée
// ══════════════════════════════════════════
// Export SILAE "Coûts salariaux" (.xlsx ou .csv/.tsv)
// Ligne 1 : titre (inutile) | Ligne 2 : vide (inutile) | Ligne 3 : EN-TÊTES
// A=Matricule B=Salarié C=Mois D-J=Heures K=Brut L=Charges sal.
// M=Charges patronales N=%charges O=Suppléments P=Coût global
// Q=Coût horaire R=PAS S=Net à payer T=Forfait U=Entrée V=Sortie W=Emploi X=Etablissement
// ⚠️ Col B (Nom) et Col W (Emploi) : renseignées UNIQUEMENT sur la 1ère ligne du salarié
//    → propager le dernier nom/emploi connu pour les mois suivants
// ⚠️ Ignorer lignes "Total", "Sous-total" et lignes entièrement vides
// ⚠️ Utiliser Col P (Coût global) pour le coût entreprise et Col K (Brut) pour le brut

function parseSILAERows(rows){
  const iNom=1, iBrut=10, iCoutGlobal=15, iEmploi=22; // Indices 0-based colonnes SILAE

  const pa=v=>{
    if(v===null||v===undefined||v==="")return 0;
    if(typeof v==="number")return v;
    const n=parseFloat(String(v).replace(/[€\s]/g,"").replace(",","."));
    return isNaN(n)?0:n;
  };

  // Classification des emplois en groupes analytiques
  const GROUPES={
    praticiens:["chirurgien","dentiste","médecin","orthodontiste","généraliste","stomatologue","pédodontiste","endodontiste","implantologue","chirurgien-dentiste","audioprothésiste","audioprothesiste","audio","opticien","orthoptiste","podologue","psychologue","ergothérapeute","diététicien","pharmacien","biologiste"],
    assistantes:["assistante dentaire","aide dentaire","assistant dentaire","aide soignant","assistante","aide","technicien","agent","employé"],
    kine:["kiné","kinésithérapeute","ostéo","infirmier","infirmière","sage-femme","orthophoniste"],
    admin:["secrétaire","accueil","coordinat","administratif","comptable","hôtesse","responsable secrétariat","responsable admin","réceptionniste","chargé"],
    direction:["directeur","directrice","manager","gérant","président","daf","drh","responsable de site","responsable","manager","co-gérant"]
  };

  const classerEmploi=emploi=>{
    const e=(emploi||"").toLowerCase();
    for(const [g,mots] of Object.entries(GROUPES)){
      if(mots.some(m=>e.includes(m)))return g;
    }
    return "autres";
  };

  const salaries={};
  let currentNom="", currentEmploi="", currentGroupe="";

  for(let i=3;i<rows.length;i++){ // Données à partir de ligne 4 (index 3, après 2 lignes inutiles + 1 en-tête)
    const row=rows[i];
    if(!row||row.length<3)continue;

    const nomRaw = row[iNom]!=null ? String(row[iNom]).trim() : "";
    const emploiRaw = row[iEmploi]!=null ? String(row[iEmploi]).trim() : "";
    const brut = pa(row[iBrut]);
    const cout = pa(row[iCoutGlobal]);

    // Ignorer lignes de totaux
    if(nomRaw.toLowerCase().includes("total"))continue;
    if(nomRaw.toLowerCase().includes("sous-total"))continue;

    // Nouveau salarié si col B (Nom) renseignée
    if(nomRaw && nomRaw!=="null" && nomRaw!=="None" && nomRaw!=="undefined"){
      currentNom = nomRaw;
      if(emploiRaw && emploiRaw!=="null" && emploiRaw!=="None"){
        currentEmploi = emploiRaw;
        currentGroupe = classerEmploi(currentEmploi);
      }
    }

    // Changement d'emploi en cours de période (ex: formation → CDI)
    if(emploiRaw && emploiRaw!=="null" && emploiRaw!=="None" && emploiRaw!==currentEmploi){
      currentEmploi = emploiRaw;
      currentGroupe = classerEmploi(currentEmploi);
    }

    if(!currentNom) continue;
    if(brut===0 && cout===0) continue; // Ligne vide

    if(!salaries[currentNom]){
      salaries[currentNom] = {nom:currentNom, emploi:currentEmploi, groupe:currentGroupe, brut:0, cout:0, mois:0};
    }
    salaries[currentNom].brut += brut;
    salaries[currentNom].cout += cout;
    salaries[currentNom].mois++;
    // Mettre à jour emploi si changé
    if(emploiRaw && emploiRaw!=="null" && emploiRaw!=="None"){
      salaries[currentNom].emploi = emploiRaw;
      salaries[currentNom].groupe = classerEmploi(emploiRaw);
    }
  }

  // Agréger par groupe
  const groupes={
    praticiens:{label:"Chirurgiens-Dentistes / Médecins",count:0,brut:0,cout:0,details:[]},
    assistantes:{label:"Assistantes dentaires",count:0,brut:0,cout:0,details:[]},
    kine:{label:"Kiné / Paramédicaux",count:0,brut:0,cout:0,details:[]},
    admin:{label:"Admin / Secrétariat / Accueil",count:0,brut:0,cout:0,details:[]},
    direction:{label:"Direction / Encadrement",count:0,brut:0,cout:0,details:[]},
    autres:{label:"Autres postes",count:0,brut:0,cout:0,details:[]}
  };
  let totalBrut=0, totalCout=0;

  Object.values(salaries).forEach(s=>{
    if(s.brut===0)return;
    const g=s.groupe||"autres";
    if(!groupes[g])groupes[g]={label:g,count:0,brut:0,cout:0,details:[]};
    groupes[g].count++;
    groupes[g].brut+=s.brut;
    groupes[g].cout+=s.cout;
    groupes[g].details.push({nom:s.nom,emploi:s.emploi,brut:Math.round(s.brut),cout:Math.round(s.cout),moisPayes:s.mois});
    totalBrut+=s.brut;
    totalCout+=s.cout;
  });

  return{groupes, totalBrut:Math.round(totalBrut), totalCout:Math.round(totalCout), nbSalaries:Object.keys(salaries).filter(k=>salaries[k].brut>0).length};
}

function parseSILAE(data, isArrayBuffer){
  if(isArrayBuffer){
    // Fichier XLSX — utilise SheetJS
    try{
      const wb=XLSX.read(data,{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:true});
      return parseSILAERows(rows);
    }catch(e){console.warn("SILAE XLSX error:",e);return null;}
  } else {
    // Fichier texte CSV/TSV
    const sep=data.includes("\t")?"\t":";";
    const rows=data.split(/\r?\n/).filter(l=>l.trim()).map(l=>l.split(sep).map(v=>v.trim().replace(/^"|"$/g,"")));
    return parseSILAERows(rows);
  }
}

function parseFEC(text){
  const lines=text.split(/\r?\n/).filter(Boolean);
  if(lines.length<2)throw new Error("FEC vide ou moins de 2 lignes");

  // Détection séparateur : | puis ; puis tab
  const sep=lines[0].includes("|")?"|":lines[0].includes(";")?";":"\t";

  // Normalisation colonnes : lowercase, sans espaces ni accents ni BOM
  const normalize=s=>s.trim().replace(/^\uFEFF/,"").replace(/^"|"$/g,"").toLowerCase()
    .replace(/\s+/g,"").replace(/[àâä]/g,"a").replace(/[éèêë]/g,"e")
    .replace(/[îï]/g,"i").replace(/[ôö]/g,"o").replace(/[ùûü]/g,"u");

  const cols=lines[0].split(sep).map(normalize);
  console.log("FEC colonnes détectées:",cols.slice(0,15).join(" | "));

  // Recherche souple des colonnes critiques
  const gi=ks=>cols.findIndex(c=>ks.some(k=>c===k||c.includes(k)));
  const iC =gi(["comptenum","compte","numcompte","codeaccount"]);
  const iD =gi(["debit","montantdebit","debiteur"]);
  const iCr=gi(["credit","montantcredit","crediteur"]);
  const iDt=gi(["ecrituredate","dateecr","datepiece","date"]);
  const iLt=gi(["ecriturelet","lettrage"]);
  const iPd=gi(["piecedate","datepiece"]);
  const iAxN=gi(["compauxnum","auxiliairenum","auxnum","tiers"]);
  const iAxL=gi(["compauxlib","auxiliairelib","auxlib","libelletiers"]);
  const iJ  =gi(["journalcode","journal","codejnl","codejournal"]);

  // Vérification colonnes critiques
  if(iC<0)throw new Error("Colonne CompteNum introuvable dans le FEC. Colonnes détectées : "+cols.slice(0,10).join(", "));
  if(iD<0)throw new Error("Colonne Debit introuvable dans le FEC. Colonnes détectées : "+cols.slice(0,10).join(", "));
  if(iCr<0)throw new Error("Colonne Credit introuvable dans le FEC. Colonnes détectées : "+cols.slice(0,10).join(", "));

  const pa=v=>{if(!v)return 0;const n=parseFloat(v.toString().replace(/["\s]/g,"").replace(",","."));return isNaN(n)?0:n;};
  const ym=dt=>dt?dt.replace(/^"|"$/g,"").replace(/[^0-9]/g,"").substring(0,6):"";

  // ── PASSE 1 : soldes de comptes et données brutes ──────────────────────
  // Pour chaque compte : solde = Σdebit - Σcredit (ALL entries incl. AN)
  const accts={}; // { cpt: { d:0, c:0, lib:"", axn:"", axl:"" } }
  let CA=0,achats=0,chargesExt=0,impots=0,salaires=0,chargesSoc=0,dotAmort=0;
  let autresProd=0,autresChg=0,prodFin=0,chgFin=0,prodExcep=0,chgExcep=0,IS=0;
  let achatsMds=0; // 607x (marchandises pures) + 603x (variation stocks) — pour marge brute commerciale
  const caMonth={},chgMonth={},fourn={};
  const agedP={"0-30":0,"30-60":0,"60-90":0,">90":0};
  const agedR={"0-30":0,"30-60":0,"60-90":0,">90":0};
  let anneeMax=0; // année max détectée dans les dates du FEC
  let totAP=0,leasing612=0,loyers613=0,logiciels616=0,honoraires622=0,autresExt61=0,totAR=0;
  const today=new Date();

  for(let i=1;i<lines.length;i++){
    const f=lines[i].split(sep).map(v=>v.trim().replace(/^"|"$/g,""));
    if(f.length<4)continue;
    const cpt=iC>=0?f[iC]:"";if(!cpt)continue;
    const d=pa(iD>=0?f[iD]:0),c=pa(iCr>=0?f[iCr]:0);
    const dt=iDt>=0?f[iDt]:"",lt=iLt>=0?f[iLt]:"",pd=iPd>=0?f[iPd]:"";
    const jnl=(iJ>=0?f[iJ]:"").toUpperCase().trim();
    // Extraire année max depuis date écriture
    if(dt){const dtClean=dt.replace(/[^0-9]/g,"");if(dtClean.length>=4){const y=parseInt(dtClean.substring(0,4));if(y>2000&&y<2100&&y>anneeMax)anneeMax=y;}}
    const axn=iAxN>=0?f[iAxN]:"",axl=iAxL>=0?f[iAxL]:"";
    const mo=ym(dt);
    // Journal AN = écritures d'ouverture → bilan uniquement, PAS CR
    const isAN=jnl==="AN"||jnl==="RAN"||jnl==="A-NOU"||jnl==="ANO"||jnl==="ANOUV"||jnl==="OUV";

    // ── Soldes de comptes (bilan) — TOUTES les écritures ──
    if(!accts[cpt])accts[cpt]={d:0,c:0,axn,axl};
    accts[cpt].d+=d; accts[cpt].c+=c;

    // ── Pour 40x et 41x : soldes PAR AUXILIAIRE (évite la compensation) ──
    // La règle PCG : chaque tiers est classé séparément selon son solde net
    // Un fournisseur débiteur (avoir) va en actif, créditeur en passif
    if(cpt.startsWith("40")||cpt.startsWith("41")){
      const auxKey = axn ? (cpt.substring(0,2)+"__AUX__"+axn) : (cpt.substring(0,2)+"__CPT__"+cpt);
      if(!accts[auxKey])accts[auxKey]={d:0,c:0,axn,axl:axl||axn,isTiersAux:true,cptRacine:cpt.substring(0,2)};
      accts[auxKey].d+=d; accts[auxKey].c+=c;
    }

    // ── CR — SAUF journal AN ── PCG complet ──────────────────────────
    // RÈGLE PCG : solde normal d'un compte 7x = CRÉDITEUR (c > d)
    // Si débiteur (d > c) → produit négatif = RRR accordé, avoir, remise arrière
    // Dans tous les cas : contribution = c - d (peut être négatif = réduction)
    if(!isAN){
      // ── Classe 70 : Ventes et prestations de services ──
      // 700-708 : CA ventes / prestations | 709 : RRR accordés (négatif = réduit CA)
      if(cpt.startsWith("70")){
        CA+=c-d; // 709x débiteur → c-d négatif → réduit CA correctement
        if(mo)caMonth[mo]=(caMonth[mo]||0)+(c-d);
      }
      // ── Classe 71-72 : Production stockée / immobilisée ──
      else if(cpt.startsWith("71")||cpt.startsWith("72"))CA+=c-d;
      // ── Classe 73 : Produits nets sur opérations de leasing ──
      else if(cpt.startsWith("73"))autresProd+=c-d;
      // ── Classe 74 : Subventions d'exploitation ──
      else if(cpt.startsWith("74"))autresProd+=c-d;
      // ── Classe 75 : Autres produits de gestion courante ──
      else if(cpt.startsWith("75"))autresProd+=c-d;
      // ── Classe 76 : Produits financiers ──
      else if(cpt.startsWith("76"))prodFin+=c-d;
      // ── Classe 77 : Produits exceptionnels ──
      else if(cpt.startsWith("77"))prodExcep+=c-d;
      // ── Classe 78 : Reprises sur amort. et provisions ──
      else if(cpt.startsWith("78"))autresProd+=c-d; // reprises = neutre pour EBITDA
      // ── Classe 79 : Transferts de charges ──
      else if(cpt.startsWith("79"))autresProd+=c-d;

      // ── Classe 60 : Achats ──
      // 600-608 : achats normaux | 609 : RRR obtenus (créditeur = réduit achats)
      else if(cpt.startsWith("60")){
        achats+=d-c; // 609x créditeur → d-c négatif → réduit achats correctement
        if(mo)chgMonth[mo]=(chgMonth[mo]||0)+(d-c);
        // 607x = marchandises (appareils, accessoires, piles) | 603x = variation stocks marchandises
        if(cpt.startsWith("607")||cpt.startsWith("609"))achatsMds+=d-c;
        if(cpt.startsWith("603"))achatsMds+=d-c; // variation stocks réduit si créditeur
      }
      // ── Classe 61-62 : Charges externes ──
      else if(cpt.match(/^6[12]/)){
        chargesExt+=d-c;
        if(mo)chgMonth[mo]=(chgMonth[mo]||0)+(d-c);
        // Détail sous-comptes pour camembert S9
        if(cpt.startsWith("612")){leasing612+=d-c;}
        else if(cpt.startsWith("613")){loyers613+=d-c;}
        else if(cpt.startsWith("616")){logiciels616+=d-c;}
        else if(cpt.startsWith("622")){honoraires622+=d-c;}
        else{autresExt61+=d-c;}
      }
      // ── Classe 63 : Impôts et taxes ──
      else if(cpt.startsWith("63")){impots+=d-c; if(mo)chgMonth[mo]=(chgMonth[mo]||0)+(d-c);}
      // ── Classe 641-644 : Salaires et appointements ──
      else if(cpt.match(/^64[1234]/)){salaires+=d-c; if(mo)chgMonth[mo]=(chgMonth[mo]||0)+(d-c);}
      // ── Classe 645-648 : Charges sociales patronales ──
      else if(cpt.match(/^64[5-9]/)){chargesSoc+=d-c; if(mo)chgMonth[mo]=(chgMonth[mo]||0)+(d-c);}
      // ── Classe 65 : Autres charges de gestion courante ──
      // Inclut 651x (redevances franchise audio) et 653x (rétrocessions SEL)
      else if(cpt.startsWith("65")){autresChg+=d-c; if(mo)chgMonth[mo]=(chgMonth[mo]||0)+(d-c);}
      // ── Classe 66 : Charges financières ──
      else if(cpt.startsWith("66")){chgFin+=d-c;}
      // ── Classe 67 : Charges exceptionnelles ──
      else if(cpt.startsWith("67")){chgExcep+=d-c;}
      // ── Classe 68 : Dotations aux amortissements et provisions ──
      else if(cpt.startsWith("68")){dotAmort+=d-c; if(mo)chgMonth[mo]=(chgMonth[mo]||0)+(d-c);}
      // ── Classe 69 : IS et participation ──
      else if(cpt.match(/^69[5-9]/))IS+=d-c;
      // ── Classe 8 : Comptes spéciaux (engagements hors bilan) — ignorer ──
    }

    // Fournisseurs auxiliaires (pour top 15) — hors AN
    if(!isAN&&cpt.startsWith("40")&&axn){
      if(!fourn[axn])fourn[axn]={name:axl||axn,d:0,c:0};
      fourn[axn].d+=d; fourn[axn].c+=c;
    }
    // Balance âgée fournisseurs (40x non lettrés, solde créditeur) — hors AN
    if(!isAN&&cpt.startsWith("40")&&!lt&&c-d>0){
      const rd=pd||dt;
      if(rd&&rd.length>=8){try{
        const age=Math.floor((today-new Date(+rd.substring(0,4),+rd.substring(4,6)-1,+rd.substring(6,8)))/86400000);
        const bk=age<=30?"0-30":age<=60?"30-60":age<=90?"60-90":">90";
        agedP[bk]+=c-d;totAP+=c-d;
      }catch{}}
    }
    // Balance âgée clients (41x non lettrés, solde débiteur) — hors AN
    if(!isAN&&cpt.startsWith("41")&&!lt&&d-c>0){
      const rd=pd||dt;
      if(rd&&rd.length>=8){try{
        const age=Math.floor((today-new Date(+rd.substring(0,4),+rd.substring(4,6)-1,+rd.substring(6,8)))/86400000);
        const bk=age<=30?"0-30":age<=60?"30-60":age<=90?"60-90":">90";
        agedR[bk]+=d-c;totAR+=d-c;
      }catch{}}
    }
  }

  // ══════════════════════════════════════════════════════════════
  // PASSE 2 — Classification bilan : UNE SEULE CHAÎNE else-if
  // garantit qu'aucun compte n'est classé deux fois
  // ══════════════════════════════════════════════════════════════
  let imoIncorpB=0,imoCorpB=0,imoFinB=0,imoAmortB=0;
  let stocksB=0,creancesCliB=0,creancesCliB_d=0,creancesCliB_c=0,autresCreancesB=0,dispoB=0;
  let capitalB=0,reservesB=0,rAnB=0,rnB=0,subvB=0,provB=0;
  let dettesFinB=0,fournissB=0,dettesSocB=0,dettesFixB=0,autresDettesB=0;
  const comptesList=[];

  for(const [key,v] of Object.entries(accts)){
    const solde=Math.round((v.d-v.c)*100)/100;
    if(Math.abs(solde)<0.005)continue;

    // Sauter les comptes 40x/41x agrégés — on utilise les clés AUX/CPT à la place
    if(!v.isTiersAux && (key.startsWith("40")||key.startsWith("41")))continue;

    // ⚠️ EXCLURE les comptes de gestion (6x CR charges, 7x CR produits, 8x)
    // Ces comptes n'ont AUCUNE place dans le bilan — leurs soldes résiduels
    // dans le FEC sont des écritures de clôture non encore passées
    const firstChar = v.isTiersAux ? v.cptRacine[0] : key[0];
    if(firstChar==="6"||firstChar==="7"||firstChar==="8"){
      // On les ajoute au diagnostic avec catégorie explicite mais sans impacter le bilan
      if(!v.isTiersAux){
        comptesList.push({cpt:key,lib:v.axl||"",debit:Math.round(v.d),credit:Math.round(v.c),solde:Math.round(solde),categorie:"CR (hors bilan)"});
      }
      continue; // NE PAS classer dans le bilan
    }

    // Identifier la racine effective du compte
    const racine = v.isTiersAux ? v.cptRacine : key.substring(0,2);
    let categorie="";

    // ── Classe 1 : Comptes de capitaux ──────────────────────────
    if(racine==="10"){
      if(key.startsWith("105")||key.startsWith("106")||key.startsWith("107")){reservesB+=(-solde);categorie="Réserves";}
      else{capitalB+=(-solde);categorie="Capital";}
    }
    else if(key.startsWith("11")){rAnB+=(-solde);categorie="RAN";}
    else if(key.startsWith("12")){rnB+=(-solde);categorie="Résultat";}
    else if(key.startsWith("13")){subvB+=(-solde);categorie="Subventions";}
    else if(key.startsWith("14")){reservesB+=(-solde);categorie="Réserves régl.";}
    else if(key.startsWith("15")){provB+=(-solde);categorie="Provisions";}
    else if(key.startsWith("16")||key.startsWith("17")){dettesFinB+=(-solde);categorie="Emprunts";}
    else if(key.startsWith("18")){autresDettesB+=(-solde);categorie="Cptes liaison";}
    else if(key.startsWith("19")){imoAmortB+=(-solde);categorie="Dépréc.immo fin";}

    // ── Classe 2 : Immobilisations ───────────────────────────────
    else if(key.startsWith("20")){imoIncorpB+=solde;categorie="Immo incorp";}
    else if(key.startsWith("21")||key.startsWith("22")||key.startsWith("23")||key.startsWith("24")||key.startsWith("25")){imoCorpB+=solde;categorie="Immo corp";}
    else if(key.startsWith("26")||key.startsWith("27")){imoFinB+=solde;categorie="Immo fin";}
    else if(key.startsWith("28")){imoAmortB+=(-solde);categorie="Amortissements";}  // solde<0 → -solde>0
    else if(key.startsWith("29")){imoAmortB+=(-solde);categorie="Dépréc.immo";}

    // ── Classe 3 : Stocks ────────────────────────────────────────
    else if(key.startsWith("3")){
      if(solde>0){stocksB+=solde;categorie="Stocks";}
      else{provB+=(-solde);categorie="Dépréc.stocks";}
    }

    // ── Classe 4 : Tiers (40/41 via auxiliaires, 42-49 directs) ─
    else if(racine==="40"){
      if(solde>0){autresCreancesB+=solde;categorie="Fourn.débiteur";}
      else{fournissB+=(-solde);categorie="Fournisseurs";}
    }
    else if(racine==="41"){
      // Tracker débit/crédit bruts pour DSO
      creancesCliB_d+=(v.d||0);
      creancesCliB_c+=(v.c||0);
      // Bilan : solde net par auxiliaire (comme la plaquette officielle)
      // solde = d - c : positif = créance (actif), négatif = avance reçue (passif)
      if(solde>0){ creancesCliB+=solde; categorie="Clients"; }
      else if(solde<0){ autresDettesB+=(-solde); categorie="Clients.avances"; }
    }
    else if(key.startsWith("42")||key.startsWith("43")){
      if(solde>0){autresCreancesB+=solde;categorie="Pers./Org.soc débiteur";}
      else{dettesSocB+=(-solde);categorie="Dettes sociales";}
    }
    else if(key.startsWith("44")){
      if(solde>0){autresCreancesB+=solde;categorie="Fiscal débiteur";}
      else{dettesFixB+=(-solde);categorie="Dettes fiscales";}
    }
    else if(key.startsWith("45")||key.startsWith("46")||key.startsWith("47")||key.startsWith("48")){
      if(solde>0){autresCreancesB+=solde;categorie="Autres créances";}
      else{autresDettesB+=(-solde);categorie="Autres dettes";}
    }
    else if(key.startsWith("49")){provB+=(-solde);categorie="Dépréc.créances";}

    // ── Classe 5 : Trésorerie ────────────────────────────────────
    else if(key.startsWith("5")){
      if(solde>0){dispoB+=solde;categorie="Trésorerie";}
      else{dettesFinB+=(-solde);categorie="Découvert bancaire";}
    }

    // Debug (vrais comptes uniquement)
    if(!v.isTiersAux){
      comptesList.push({cpt:key,lib:v.axl||"",debit:Math.round(v.d),credit:Math.round(v.c),solde:Math.round(solde),categorie});
    }
  }

  // ── Totaux bilan provisoires (utilisés pour calcul rnB_final ci-dessous) ──
  const actiImmoNet=imoIncorpB+imoCorpB+imoFinB-imoAmortB;

  // ── CR Totaux ──────────────────────────────────────────────────
  // Définition EBITDA standard (bottom-up) :
  // EBITDA = RN + IS + Résultat financier net + DAP + Résultat exceptionnel net
  // = RN + IS + (chgFin - prodFin) + dotAmort + (chgExcep - prodExcep)

  const ms=salaires+chargesSoc;   // 64x uniquement (salaires + charges sociales)
  const msAvecTaxes=impots+ms;    // 63x + 64x — pour le ratio MS/CA version V12

  const totalProd=CA+autresProd+prodFin+prodExcep;
  const totalChg=achats+chargesExt+impots+ms+dotAmort+autresChg+chgFin+chgExcep+IS; // IS=D-C : positif=charge, négatif=avoir d'IS
  const RN_exact=totalProd-totalChg;

  // EBITDA bottom-up = RN + IS + résultat financier net + DAP + résultat exceptionnel net
  const resFin=chgFin-prodFin;           // charges financières nettes
  const resExcep=chgExcep-prodExcep;     // charges exceptionnelles nettes
  const EBITDA=RN_exact+IS+resFin+dotAmort+resExcep; // IS charge nette : add-back IS payé, soustrait si avoir
  // Vérification top-down : CA - 60x - 61x/62x - 63x - 64x (hors amort/fin/excep)
  const EBITDA_check=CA-achats-chargesExt-impots-ms;

  const MB=CA-achats-chargesExt;
  const EBE=MB-impots-ms;         // EBE français = EBITDA ici (même résultat)
  const EBIT=EBITDA-dotAmort;
  const REX=EBIT-resFin;
  const CAF=RN_exact+dotAmort;

  // ══════════════════════════════════════════════════════════════
  // RÉSULTAT NET — DÉRIVATION MATHÉMATIQUE UNIQUEMENT
  // ══════════════════════════════════════════════════════════════
  // RÈGLE ABSOLUE : on NE fait JAMAIS confiance au solde du compte 12x.
  // Raison : les FEC provisoires (Pennylane, Sage, EBP...) contiennent
  // en 12x soit 0, soit l'ancien résultat N-1 non clôturé.
  // La seule valeur fiable est : RN = Actif - Passif_hors_résultat
  // C'est une identité comptable garantie par la partie double.
  // ── Créances clients nettes (41x débit - 41x crédit) ──────────────
  // DSO = solde NET des 411 (actif - passif) / CA × 365
  // Les avoirs clients et acomptes reçus (41 créditeurs) viennent réduire la créance nette
  // ── Créances 41x — DSO uniquement, bilan reste en BRUT ─────────────
  // Le bilan affiche BRUT comme la plaquette officielle :
  // Actif = Σ débits 41x | Passif "autres dettes" = Σ crédits 41x
  // creancesCliB et autresDettesB sont déjà alimentés en BRUT dans la passe 2
  // DSO utilise le NET pour mesurer la créance réellement due
  const cli411Net = creancesCliB_d - creancesCliB_c;
  // Ne pas modifier creancesCliB ni autresDettesB ici — ils sont déjà corrects

  const actifTotal_tmp = actiImmoNet+stocksB+creancesCliB+autresCreancesB+dispoB;
  const passifTotal_excl12 = capitalB+reservesB+rAnB+subvB+provB+dettesFinB+fournissB+dettesSocB+dettesFixB+autresDettesB;
  const rnB_final = actifTotal_tmp - passifTotal_excl12; // toujours correct
  // Note : si le FEC a des écritures de clôture, rnB (12x) = rnB_final (idem)
  // Si FEC provisoire, rnB (12x) est stale → on l'ignore et prend rnB_final

  const cpTot = capitalB+reservesB+rAnB+rnB_final+subvB;
  const actifTotal = actifTotal_tmp;
  const passifTotal = cpTot+provB+dettesFinB+fournissB+dettesSocB+dettesFixB+autresDettesB;
  const bilanEcart = Math.round((actifTotal-passifTotal)*100)/100; // doit être 0

  const rnBilan = rnB_final;
  const rnEcart = Math.abs(rnB) > 1 ? Math.abs(RN_exact-rnB_final)/Math.max(1,Math.abs(rnB_final)) : 0;

  // Équilibre financier
  const FRNG=(cpTot+provB+dettesFinB)-actiImmoNet;
  const creancesCliNettes = Math.max(0, cli411Net); // net positif uniquement pour DSO/BFR
  const BFR=creancesCliNettes+stocksB-fournissB;
  const TN=dispoB;

  // Ratios
  // DSO = NET 41x (débiteurs - créditeurs) / (CA / 365)
  const DSO=CA>0?Math.round(creancesCliNettes/(CA/365)):0;
  // DPO = Dettes fournisseurs 40x / (Achats / 365)
  const DPO=achats>0?Math.round(fournissB/(achats/365)):0;

  // Top 15 fournisseurs par débit
  // Top 20 fournisseurs par SOLDE CRÉDITEUR (dette en cours) — montants absolus
  const top20=Object.values(fourn)
    .map(f=>({name:f.name,debit:Math.round(f.d),credit:Math.round(f.c),solde:Math.round(f.c-f.d)}))
    .filter(f=>f.solde>0) // uniquement les créditeurs (dettes)
    .sort((a,b)=>b.solde-a.solde) // tri par solde créditeur décroissant
    .slice(0,20);
  const top15=top20; // compatibilité ascendante

  // Mensuel
  const caArr=Object.entries(caMonth).sort((a,b)=>a[0].localeCompare(b[0])).map(([mo,v])=>({mo,v:Math.round(v)}));
  const chgArr=Object.entries(chgMonth).sort((a,b)=>a[0].localeCompare(b[0])).map(([mo,v])=>({mo,v:Math.round(v)}));
  const hasCa=caArr.some(x=>x.v>100);

  // Alertes
  const alerts=[];

━━━ CONTEXTE SECTORIEL AUDIOPROTHÈSE ━━━

1. Cadre réglementaire
• Diplôme d'État d'audioprothésiste obligatoire (bac+5) — chaque centre doit avoir un audioprothésiste DE responsable inscrit au CNOA
• Agrément CPAM par centre pour facturer en tiers payant
• Réforme 100% Santé (2021) : panier Class I (remboursé intégralement SS+mutuelle, prix plafonné), panier Class II (dépassements libres, pris en charge partiellement par mutuelles ROCO/RAC0)
• Garantie 4 ans sur appareils Class I et II
• Bilan auditif et essai obligatoires (30 jours min) avant toute vente

2. Structure du chiffre d'affaires
• CA Class I (appareils plafonnés ~950€/oreille 2024) : marge brute ~40-50% (prix constructeur élevé car plafond SS)
• CA Class II (dépassements libres, prix moyen ~1 500-2 500€/oreille) : marge brute ~55-65%
• Accessoires et piles : marge brute ~60-70%
• Prestations SAV / suivi : forfait inclus dans le prix — pas de CA séparé
• Honoraires de dispensation CPAM : ~85€/oreille inclus dans les plafonds
• Subventions / aides exceptionnelles : comptes 74x — isoler

3. Structure des charges spécifiques
• Achats appareils (60x) : fournisseurs constructeurs (Phonak, Oticon, Signia, Starkey, Widex, ReSound…) — approvisionnement direct, pas de répartiteurs
• Redevances franchise / réseau (651x) : 4-9% CA selon contrat — ⚠️ ISOLER ce poste car impact direct EBITDA
• Loyers locaux (613x) : centres en ville/centre commercial — loyer/CA benchmark 5-8%
• Personnel (641-645) : audioprothésistes (statut cadre, salaire moyen 45-65k€ brut) + assistantes + optionnellement secrétaire
• Leasing matériel audiologique (612x) : cabines insonorisées, audiomètres, appareils de mesure in-situ
• Logiciels (616x) : Noah, Otosuite, Bilink, logiciels de gestion mutuelle

4. Ratios et benchmarks sectoriels
• CA/ETP audioprothésiste : 300-500k€ — <300k = sous-productivité | >500k = sur-sollicitation ou volumes Class I élevés
• Marge brute/CA : 50-60% — Class I tire vers le bas (marge plus faible)
• MS/CA (audioprothésistes + support) : 25-40% selon ratio ETP/CA
• EBITDA/CA : 12-22% (indépendants) | 8-15% (franchisés, impact redevances)
• Redevance franchise/CA : 4-9% selon réseau — au-dessus de 9% = vigilance
• Loyer/CA : 5-8% — au-dessus de 10% = risque
• DMS stocks (appareils en attente pose) : variable selon organisation — >60j = immobilisation excessive
• DSO : CPAM 7j | mutuelles 15-30j | patients comptant 0j | RAC 0-30j

5. Spécificités comptables
• Compte 651x : redevances de concession, brevet, franchise — ⚠️ TOUJOURS isoler et analyser séparément
• Compte 706x : ventes d'appareils (Class I et II mélangés sauf si ventilés par auxiliaire)
• Compte 707x : ventes d'accessoires et piles
• Comptes 41x : CPAM (règlement ~7j) | mutuelles ROCO (15-30j) | patients
• Garantie : provisions 15x si comptabilisées

6. Valorisation
• Multiple EBITDA : 4-7x selon taille, réseau, ancienneté patientèle
• CA/ETP praticien : indicateur clé pour l'acheteur
• Qualité du fichier patient (ancienneté, taux de renouvellement ~5-7 ans)
• Risque franchise : durée restante contrat, clauses de renouvellement

function buildChargesSlide(ents, parsedMap, answers){
  const gf = v => Math.round(v||0).toLocaleString("fr-FR");
  const pct = (a,b) => b>0 ? (a/b*100).toFixed(1)+"%" : "N/D";
  const N="#0A1E6E", C="#00C2CB";

  // Camembert SVG — calcul des arcs
  function makePie(slices, cx, cy, r){
    let total = slices.reduce((s,x)=>s+x.v,0);
    if(total<=0) return '<text x="'+cx+'" y="'+cy+'" text-anchor="middle" font-size="12" fill="#6B7280">Données insuffisantes</text>';
    let angle = -Math.PI/2; // démarrer en haut
    let paths = '';
    slices.forEach(s=>{
      if(s.v<=0) return;
      const sweep = (s.v/total)*2*Math.PI;
      const x1 = cx + r*Math.cos(angle);
      const y1 = cy + r*Math.sin(angle);
      const x2 = cx + r*Math.cos(angle+sweep);
      const y2 = cy + r*Math.sin(angle+sweep);
      const lg = sweep > Math.PI ? 1 : 0;
      paths += '<path d="M'+cx+','+cy+' L'+x1.toFixed(1)+','+y1.toFixed(1)+
        ' A'+r+','+r+' 0 '+lg+',1 '+x2.toFixed(1)+','+y2.toFixed(1)+' Z" fill="'+s.color+'"/>';
      angle += sweep;
    });
    return paths;
  }

  // Légende SVG
  function makeLegend(slices, total, x, yStart, ca){
    return slices.filter(s=>s.v>0).map((s,i)=>{
      const y = yStart + i*26;
      const p = ca>0 ? (s.v/ca*100).toFixed(1) : "—";
      return '<rect x="'+x+'" y="'+y+'" width="11" height="11" fill="'+s.color+'" rx="2"/>'+
        '<text x="'+(x+15)+'" y="'+(y+9)+'" font-size="10" fill="#2C3566">'+s.label+' '+Math.round(s.v/1000)+'k€ ('+p+'%)</text>';
    }).join('');
  }

  const logoSrc = typeof KOPILOT_LOGO_B64!=="undefined" ? KOPILOT_LOGO_B64 : "";
  const logoImg = '<img id="klogo" alt="KPLT" style="height:32px;width:auto" src="'+logoSrc+'">';
  const exercice = answers.exercice||"N";

  // Construire les sections par entité
  const sections = ents.map((ent,ei)=>{
    const p = parsedMap[ent.id];
    if(!p) return '<div style="flex:1;padding:0 12px"><p style="color:#6B7280;font-size:11px">Données non disponibles</p></div>';

    const ca = p.CA||0;
    const slices = [
      {label:"Masse salariale 64x", v:p.msAvecTaxes||0, color:"#0A1E6E"},
      {label:"Consommables 602x",   v:p.achats||0,       color:"#00C2CB"},
      {label:"Loyers 613x",         v:p.loyers613||0,    color:"#3B82F6"},
      {label:"Charges ext 61-62x",  v:(p.autresExt61||0)+(p.honoraires622||0)+(p.logiciels616||0)+(p.leasing612||0), color:"#8B5CF6"},
      {label:"Taxes 63x",           v:p.impots||0,       color:"#F59E0B"},
      {label:"DAP 68x",             v:p.dotAmort||0,     color:"#6B7280"},
    ].filter(s=>s.v>0);

    const total = slices.reduce((s,x)=>s+x.v,0);
    const svgW = 420, svgH = 280, cx=130, cy=140, r=110;
    const pieArcs = makePie(slices, cx, cy, r);
    const legend = makeLegend(slices, total, 260, 20, ca);

    // Tableau détail
    const details = [
      {poste:"Loyers locaux",       cpt:"613x", v:p.loyers613||0},
      {poste:"Leasing matériel",    cpt:"612x", v:p.leasing612||0},
      {poste:"Logiciels & licences",cpt:"616x", v:p.logiciels616||0},
      {poste:"Honoraires ext",      cpt:"622x", v:p.honoraires622||0},
      {poste:"Autres ext 61-62x",   cpt:"61-62x",v:p.autresExt61||0},
    ].filter(d=>d.v>0);

    const tableRows = details.map((d,i)=>`
      <tr style="background:${i%2===0?"white":"#EEF1FA"}">
        <td style="padding:5px 10px;font-size:10px;color:#2C3566">${d.poste}</td>
        <td style="padding:5px 10px;font-size:10px;color:#6B7BA4">${d.cpt}</td>
        <td style="padding:5px 10px;font-size:10px;text-align:right;font-weight:600">${gf(Math.round(d.v))}€</td>
        <td style="padding:5px 10px;font-size:10px;text-align:right;color:#6B7BA4">${pct(d.v,ca)}</td>
      </tr>`).join('');

    const colW = ents.length===1 ? "100%" : ents.length===2 ? "48%" : "31%";

    return `<div style="width:${colW};flex-shrink:0">
      <div style="font-size:12px;font-weight:700;color:#0A1E6E;border-bottom:2px solid #00C2CB;padding-bottom:4px;margin-bottom:10px">── ${ent.name||"Entité "+(ei+1)} ──</div>
      <svg viewBox="0 0 ${svgW} ${svgH}" style="width:100%;height:auto;display:block;overflow:visible">
        ${pieArcs}
        ${legend}
        <text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="11" font-weight="600" fill="#0A1E6E">${Math.round(total/1000)}k€</text>
      </svg>
      ${details.length>0?`<table style="width:100%;border-collapse:collapse;margin-top:8px">
        <thead><tr style="background:#0A1E6E"><th style="padding:5px 10px;font-size:10px;color:white;text-align:left">Poste</th><th style="padding:5px 10px;font-size:10px;color:white">Cpte</th><th style="padding:5px 10px;font-size:10px;color:white;text-align:right">Montant</th><th style="padding:5px 10px;font-size:10px;color:white;text-align:right">%CA</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>`:""}
    </div>`;
  });

  return `<!-- SLIDE STRUCTURE CHARGES — GÉNÉRÉ CÔTÉ JS -->
<div class="slide" style="width:1280px;min-height:720px;max-height:720px;background:#F4F6FB;display:flex;flex-direction:column;page-break-after:always;overflow:hidden">

    <div style="display:flex;align-items:center;gap:16px">${logoImg}<h1 style="color:white;font-size:18px;font-weight:700;margin:0">Structure des Charges — par Entité</h1></div>
    <span style="color:#00C2CB;background:rgba(0,194,203,0.15);border:1px solid rgba(0,194,203,0.3);border-radius:20px;padding:4px 14px;font-size:11px;font-weight:600">Répartition ${exercice}</span>

    ${sections.join("")}

    <span style="color:rgba(255,255,255,0.5);font-size:11px">Confidentiel — KPLT</span>
  </div>
</div>`;
}

// GÉNÉRATEUR DE RAPPORT COMPLET — 100% CÔTÉ JS
// Le modèle ne génère que les commentaires analytiques (JSON)
// Toute la structure HTML/SVG est déterministe depuis les données parsées

const R = {
  // Utilitaires
  gf: v => Math.round(v||0).toLocaleString("fr-FR"),
  gfk: v => Math.round((v||0)/1000).toLocaleString("fr-FR"),
  pct: (a,b) => b&&Math.abs(b)>0 ? (a/b*100).toFixed(1)+"%" : "N/D",
  pctN: (a,b) => b&&Math.abs(b)>0 ? (a/b*100).toFixed(1) : null,
  logo: () => typeof KOPILOT_LOGO_B64!=="undefined" ? `<img id="klogo" alt="KPLT" style="height:32px;width:auto" src="${KOPILOT_LOGO_B64}">` : "",
  logoLg: () => typeof KOPILOT_LOGO_B64!=="undefined" ? `<img id="klogo" alt="KPLT" style="height:52px;width:auto;display:block;margin:0 auto 20px" src="${KOPILOT_LOGO_B64}">` : "",

  // Slide wrapper
  slide: (header, body, footer, isCover=false) => `
<div class="${isCover?'slide cover':'slide'}" style="width:1280px;min-height:720px;max-height:720px;background:${isCover?'linear-gradient(160deg,#000C3E 0%,#00146E 55%,#1A3BAA 100%)':'#F4F6FB'};display:flex;flex-direction:column;page-break-after:always;overflow:hidden;box-sizing:border-box">
  ${header}
  <div style="flex:1;overflow:hidden;${isCover?'display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;text-align:center':'padding:16px 36px'}">
    ${body}
  </div>
  <div style="background:#00146E;height:36px;display:flex;align-items:center;padding:0 40px;justify-content:space-between;flex-shrink:0;font-family:Inter,sans-serif">
    <span style="color:rgba(255,255,255,0.5);font-size:11px">Confidentiel — KPLT</span>
    ${footer}
  </div>
</div>`,

  // Header slide standard
  hdr: (title, badge, slideN, total) => `
<div style="background:linear-gradient(135deg,#001259,#00146E,#1A3BAA);height:72px;display:flex;align-items:center;padding:0 40px;justify-content:space-between;flex-shrink:0;font-family:Inter,sans-serif">
  <div style="display:flex;align-items:center;gap:16px">${R.logo()}<span style="color:white;font-size:18px;font-weight:700">${title}</span></div>
  <div style="display:flex;align-items:center;gap:12px">
    ${badge?`<span style="color:#00C2CB;background:rgba(0,194,203,0.15);border:1px solid rgba(0,194,203,0.3);border-radius:20px;padding:4px 14px;font-size:11px;font-weight:600">${badge}</span>`:""}
    <span style="color:white;font-size:13px;font-weight:700;background:rgba(26,59,170,0.5);padding:2px 10px;border-radius:4px">${slideN}/${total}</span>
  </div>
</div>`,

  // KPI card
  kpiCard: (val, label, sub, color) => `
<div style="background:white;border-radius:10px;padding:18px 16px;border-top:4px solid ${color};display:flex;flex-direction:column;justify-content:space-between;font-family:Inter,sans-serif">
  <div style="font-size:28px;font-weight:700;color:#00146E;line-height:1.1">${val}</div>
  <div style="font-size:12px;font-weight:600;color:#2C3566;margin-top:8px">${label}</div>
  ${sub?`<div style="font-size:10px;color:#6B7BA4;margin-top:4px">${sub}</div>`:""}
</div>`,

  // Tableau header
  tblHdr: (...cols) => `<thead style="background:#00146E"><tr>${cols.map(c=>`<th style="padding:7px 10px;font-size:11px;font-weight:600;color:white;text-align:${c.align||'left'}">${c.label}</th>`).join("")}</tr></thead>`,

  // Tableau ligne
  tblRow: (cells, i) => `<tr style="background:${i%2===0?'white':'#EEF1FA'}">${cells.map(c=>`<td style="padding:5px 10px;font-size:11px;color:#2C3566;text-align:${c.align||'left'};${c.bold?'font-weight:700':''}${c.color?';color:'+c.color:''}">${c.v??""}</td>`).join("")}</tr>`,

  // Camembert SVG
  pie: (slices, cx, cy, r, legendX, legendY0) => {
    const total = slices.reduce((s,x)=>s+(x.v||0),0);
    if(!total) return `<text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="12" fill="#9CA3AF">Données insuffisantes</text>`;
    let angle = -Math.PI/2, paths="", legend="";
    slices.filter(s=>s.v>0).forEach((s,i)=>{
      const sweep = (s.v/total)*2*Math.PI;
      const x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
      const x2=cx+r*Math.cos(angle+sweep), y2=cy+r*Math.sin(angle+sweep);
      paths += `<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${sweep>Math.PI?1:0},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${s.c}"/>`;
      const ly = legendY0+i*24;
      legend += `<rect x="${legendX}" y="${ly}" width="11" height="11" fill="${s.c}" rx="2"/>`;
      legend += `<text x="${legendX+14}" y="${ly+9}" font-size="10" fill="#2C3566">${s.label} ${Math.round((s.v||0)/1000)}k€ (${(s.v/total*100).toFixed(0)}%)</text>`;
      angle += sweep;
    });
    return paths+legend;
  },

  // Barres horizontales (balance âgée)
  hBars: (bars, yStart, maxW, barH, gap) => bars.map((b,i)=>{
    const y=yStart+i*(barH+gap), w=maxW>0?Math.round(b.v/maxW*maxW):0;
    const pct=maxW>0?(b.v/maxW*100).toFixed(0):0;
    return w>0?`<rect x="0" y="${y}" width="${Math.round(b.v/Math.max(...bars.map(x=>x.v||1))*600)}" height="${barH}" fill="${b.c}" rx="3"/>
<text x="${Math.round(b.v/Math.max(...bars.map(x=>x.v||1))*600)+6}" y="${y+barH-3}" font-size="10" fill="#2C3566">${b.label} ${Math.round((b.v||0)/1000)}k€ (${pct}%)</text>`:"";
  }).join(""),

  // Barres verticales (activité mensuelle)
  vBars: (values, labels, w, h, barW) => {
    const maxV = Math.max(...values.filter(v=>v>0), 1);
    const nBars = values.length;
    const spacing = Math.floor(w/nBars);
    let bars="", axes="";
    // Axe Y graduations
    [0,25,50,75,100].forEach(p=>{
      const y = h-Math.round(p/100*h);
      const v = Math.round(maxV*p/100/1000);
      axes += `<line x1="40" y1="${y}" x2="${w}" y2="${y}" stroke="#DDE3F0" stroke-width="0.5"/>`;
      if(v>0) axes += `<text x="36" y="${y+4}" font-size="9" fill="#9CA3AF" text-anchor="end">${v}k</text>`;
    });
    values.forEach((v,i)=>{
      if(!v) return;
      const bh = Math.round(v/maxV*(h-20));
      const x = 45+i*spacing;
      const y = h-bh;
      bars += `<rect x="${x}" y="${y}" width="${spacing-4}" height="${bh}" fill="#0A1E6E" rx="2"/>`;
      bars += `<text x="${x+(spacing-4)/2}" y="${y-5}" text-anchor="middle" font-size="10" font-weight="700" fill="#0A1E6E">${Math.round(v/1000)}k€</text>`;
      bars += `<text x="${x+(spacing-4)/2}" y="${h+14}" text-anchor="middle" font-size="9" fill="#6B7BA4">${labels[i]||""}</text>`;
    });
    return axes+bars;
  }
};

// ── Helpers communs ───────────────────────────────────────────────────
function slideHeader(title, badge, n, total){ return R.hdr(title,badge,n,total); }
function slideFooter(n, total){ return `<span style="color:#00C2CB;font-size:13px;font-weight:700">${n}/${total}</span>`; }

// Calcul consolidation (Asso(s) uniquement pour CA)
function calcConso(ents, parsedMap, answers){
  const schema = answers.schema||"1asso-1sas";
  const is2asso = schema==="2asso-1sas";
  const nb = ents.length;
  const sasEnt = ents[nb-1];
  const assoEnts = ents.slice(0,nb-1);
  
  let cCA=0, cEBITDA=0, cRN=0, cTreso=0, cMS=0, cPratBrut=0;
  assoEnts.forEach(e=>{ const p=parsedMap[e.id]; if(!p)return; cCA+=p.CA||0; cMS+=p.msAvecTaxes||0; cRN+=p.RN||0; cEBITDA+=p.EBITDA||0; });
  const sasp = parsedMap[sasEnt.id];
  if(sasp){ cEBITDA+=sasp.EBITDA||0; cRN+=sasp.RN||0; cTreso+=sasp.dispoB||0; }
  assoEnts.forEach(e=>{ const p=parsedMap[e.id]; if(p)cTreso+=p.dispoB||0; });
  
  // Praticiens SILAE
  ents.forEach(e=>{ 
    const s=ST.parsedSILAE&&ST.parsedSILAE[e.id]; 
    if(s&&s.groupes&&s.groupes.praticiens) cPratBrut+=s.groupes.praticiens.brut||0; 
  });
  
  const intercoCA = sasp?sasp.CA:0;
  return {cCA,cEBITDA,cRN,cTreso,cMS,cPratBrut,intercoCA,assoEnts,sasEnt,sasp,is2asso};
}

// ── S2 CONTEXTE GROUPE ───────────────────────────────────────────────
function buildS2Contexte(ents, answers, n, total){
  const a = answers;
  const rows = [];
  const addRow = (label, ...vals) => {
    const allEmpty = vals.every(v=>!v||v==="—"||v==="N/D"||v==="Non renseigné");
    if(!allEmpty) rows.push({label, vals});
  };
  // Données Pappers + réponses
  addRow("Forme juridique", ...ents.map(e=>e.pappers?.forme_juridique||"—"));
  addRow("Spécialité", ...ents.map(e=>a.specialite||"—"));
  if(a.finess) addRow("FINESS", a.finess, ...ents.slice(1).map(()=>"—"));
  addRow("Convention", ...ents.map((e,i)=>i===ents.length-1?"—":a.convention||"CC51"));
  addRow("Capital social", ...ents.map(e=>e.pappers?.capital?R.gf(e.pappers.capital)+"€":"—"));
  addRow("Effectif ETP", ...ents.map((e,i)=>{
    const p=ST.parsed[e.id]; return p&&p.ETP?p.ETP+" ETP":"—";
  }));
  addRow("Groupe TVA", ...ents.map(()=>a.groupeTVA||"Non"));
  addRow("Dirigeant", ...ents.map(e=>e.pappers?.dirigeant||"—"));

  const cols = `<th style="padding:8px 14px;font-size:11px;font-weight:600;color:white;text-align:left">Critère</th>`
    + ents.map(e=>`<th style="padding:8px 14px;font-size:11px;font-weight:600;color:white">${e.name||"Entité"}</th>`).join("");

  const trs = rows.map((r,i)=>`<tr style="background:${i%2===0?'white':'#EEF1FA'}">
    <td style="padding:10px 14px;font-size:12px;font-weight:600;color:#2C3566">${r.label}</td>
    ${r.vals.map(v=>`<td style="padding:10px 14px;font-size:12px;color:#2C3566">${v||"—"}</td>`).join("")}
  </tr>`).join("");

  const body = `<table style="width:100%;border-collapse:collapse;font-family:Inter,sans-serif">
    <thead style="background:#00146E"><tr>${cols}</tr></thead>
    <tbody>${trs}</tbody>
  </table>
  <div style="margin-top:16px;padding:12px 16px;background:rgba(0,194,203,0.08);border-left:3px solid #00C2CB;border-radius:4px;font-size:11px;color:#2C3566;font-family:Inter,sans-serif">
    Structure : ${answers.schema==="2asso-1sas"?"2 Associations + 1 SAS de gestion":"1 Association + 1 SAS de gestion"} — Convention CC51 — Secteur santé
  </div>`;

  return R.slide(R.hdr("Contexte Groupe","Structure",n,total), body, slideFooter(n,total));
}

// ── S3 KPIs CONSOLIDÉS ────────────────────────────────────────────────
function buildS3KPIs(ents, parsedMap, parsedSILAE, answers, comments, n, total){
  const co = calcConso(ents, parsedMap, answers);
  const gf = R.gf, gfk = R.gfk, pct = R.pct;
  const ex = answers.exercice||"N";
  const dso = (() => { let d=0,c=0; co.assoEnts.forEach(e=>{const p=parsedMap[e.id];if(p){d+=p.DSO||0;c++;}}); return c?Math.round(d/c):0; })();
  const dnEbitda = co.cEBITDA>0 ? (co.cEBITDA/co.cEBITDA).toFixed(1) : "N/D"; // sera calculé avec CRD emprunts
  const pratRatio = co.cCA>0 ? R.pctN(co.cPratBrut, co.cCA) : null;
  const msRatio = co.cCA>0 ? R.pctN(co.cMS, co.cCA) : null;

  const kpis = [
    {val:`${gfk(co.cCA)}k€`, label:"CA Consolidé", sub:`${ex} — Asso uniquement`, color:"#1A3BAA"},
    {val:`${gfk(co.cEBITDA)}k€`, label:"EBITDA Consolidé", sub:co.cCA>0?`${R.pctN(co.cEBITDA,co.cCA)}% du CA`:null, color:co.cEBITDA>=0?"#15803D":"#C53030"},
    {val:co.cCA>0?`${R.pctN(co.cEBITDA,co.cCA)}%`:"N/D", label:"EBITDA %", sub:"Cible CdS > 10%", color:co.cEBITDA/co.cCA>0.10?"#15803D":"#B45309"},
    {val:`${gfk(co.cRN)}k€`, label:"Résultat Net Groupe", sub:co.cRN>=0?"Positif":"Déficitaire", color:co.cRN>=0?"#15803D":"#C53030"},
    {val:`${gfk(co.cTreso)}k€`, label:"Trésorerie Consolidée", sub:co.cCA>0?`${(co.cTreso/co.cCA*12).toFixed(1)} mois de CA`:null, color:"#0891B2"},
    {val:pratRatio?`${pratRatio}%`:"N/D", label:"Praticiens / CA", sub:"Benchmark 28-32%", color:pratRatio&&parseFloat(pratRatio)>=28&&parseFloat(pratRatio)<=32?"#15803D":"#B45309"},
    {val:msRatio?`${msRatio}%`:"N/D", label:"MS/CA Total SILAE", sub:"Benchmark 58-64%", color:msRatio&&parseFloat(msRatio)>=58&&parseFloat(msRatio)<=64?"#15803D":"#B45309"},

  ];

  const body = `

}

// ── S WATERFALL ──────────────────────────────────────────────────────
function buildSWaterfall(ents, parsedMap, answers, n, total){
  const co = calcConso(ents, parsedMap, answers);
  const CA = co.cCA, gfk=R.gfk, pct=R.pct;
  if(!CA) return "";

  // Données cascade
  const steps = [
    {label:"CA", v:CA, type:"total", color:"#1A3BAA"},
    {label:"Consommables", v:-(Object.values(parsedMap).reduce((s,p)=>s+(p?.achats||0),0)), color:"#EF4444"},
    {label:"Charges ext", v:-(Object.values(parsedMap).reduce((s,p)=>s+(p?.chargesExt||0),0)), color:"#F97316"},
    {label:"MS 64x", v:-(co.cMS||0), color:"#DC2626"},
    {label:"EBITDA", v:co.cEBITDA, type:"total", color:co.cEBITDA>=0?"#15803D":"#C53030"},
    {label:"DAP", v:-(Object.values(parsedMap).reduce((s,p)=>s+(p?.dotAmort||0),0)), color:"#9CA3AF"},
    {label:"Fin+Excep+IS", v:Object.values(parsedMap).reduce((s,p)=>s+((p?.prodFin||0)-(p?.chgFin||0)+(p?.prodExcep||0)-(p?.chgExcep||0)-(p?.IS||0)),0), color:"#6366F1"},
    {label:"RN", v:co.cRN, type:"total", color:co.cRN>=0?"#059669":"#C53030"},
  ];

  const svgW=1160, svgH=480;
  const barW=90, gap=40, startX=60, maxH=340, baseY=380;
  let running=CA, svgContent="";

  // Axe Y
  svgContent += `<line x1="${startX}" y1="40" x2="${startX}" y2="${baseY}" stroke="#DDE3F0" stroke-width="1"/>
  <line x1="${startX}" y1="${baseY}" x2="${svgW-20}" y2="${baseY}" stroke="#DDE3F0" stroke-width="1"/>`;

  steps.forEach((step,i)=>{
    const x = startX + i*(barW+gap);
    if(step.type==="total"){
      const bh = Math.abs(step.v)/CA*maxH;
      const y = step.v>=0 ? baseY-bh : baseY;
      svgContent += `<rect x="${x}" y="${y.toFixed(0)}" width="${barW}" height="${bh.toFixed(0)}" fill="${step.color}" rx="3"/>`;
      svgContent += `<text x="${x+barW/2}" y="${(y-6).toFixed(0)}" text-anchor="middle" font-size="11" font-weight="700" fill="${step.color}">${gfk(step.v)}k€</text>`;
      svgContent += `<text x="${x+barW/2}" y="${(baseY+16).toFixed(0)}" text-anchor="middle" font-size="10" fill="#6B7BA4">${step.label}</text>`;
      svgContent += `<text x="${x+barW/2}" y="${(baseY+28).toFixed(0)}" text-anchor="middle" font-size="9" fill="#9CA3AF">${pct(Math.abs(step.v),CA)}</text>`;
      running = step.v;
    } else {
      const bh = Math.abs(step.v)/CA*maxH;
      const yTop = step.v<0 ? baseY-running/CA*maxH-bh : baseY-running/CA*maxH;
      svgContent += `<rect x="${x}" y="${yTop.toFixed(0)}" width="${barW}" height="${bh.toFixed(0)}" fill="${step.color}" rx="3" opacity="0.85"/>`;
      svgContent += `<text x="${x+barW/2}" y="${(yTop-6).toFixed(0)}" text-anchor="middle" font-size="10" font-weight="600" fill="${step.color}">${gfk(step.v)}k€</text>`;
      svgContent += `<text x="${x+barW/2}" y="${(baseY+16).toFixed(0)}" text-anchor="middle" font-size="10" fill="#6B7BA4">${step.label}</text>`;
      svgContent += `<text x="${x+barW/2}" y="${(baseY+28).toFixed(0)}" text-anchor="middle" font-size="9" fill="#9CA3AF">${pct(Math.abs(step.v),CA)}</text>`;
      running += step.v;
    }
    // Connecteur
    if(i<steps.length-1){
      const xNext=x+barW+gap;
      const yLine = baseY-running/CA*maxH;
      svgContent += `<line x1="${x+barW}" y1="${yLine.toFixed(0)}" x2="${xNext}" y2="${yLine.toFixed(0)}" stroke="#DDE3F0" stroke-dasharray="4,2" stroke-width="1"/>`;
    }
  });

  // Légende
  svgContent += `<rect x="900" y="40" width="12" height="12" fill="#1A3BAA" rx="2"/>
  <text x="916" y="50" font-size="10" fill="#6B7BA4">Total/EBITDA</text>
  <rect x="900" y="58" width="12" height="12" fill="#EF4444" rx="2"/>
  <text x="916" y="68" font-size="10" fill="#6B7BA4">Charge</text>
  <rect x="900" y="76" width="12" height="12" fill="#059669" rx="2"/>
  <text x="916" y="86" font-size="10" fill="#6B7BA4">Résultat positif</text>`;

  const body=`<svg viewBox="0 0 ${svgW} ${svgH}" style="width:100%;height:100%;font-family:Inter,sans-serif">${svgContent}</svg>`;
  return R.slide(R.hdr("CR Consolidé — Waterfall","Performance "+answers.exercice,n,total),body,slideFooter(n,total));
}

// ── S ACTIVITÉ MENSUELLE ─────────────────────────────────────────────
function buildSActivite(ents, parsedMap, answers, n, total){
  const MOIS=["JAN","FÉV","MAR","AVR","MAI","JUN","JUL","AOÛ","SEP","OCT","NOV","DÉC"];
  // Consolider caArr de toutes les Asso
  const caConsolide = new Array(12).fill(0);
  const co = calcConso(ents, parsedMap, answers);
  co.assoEnts.forEach(e=>{
    const p=parsedMap[e.id];
    if(p&&p.caArr) p.caArr.forEach((v,i)=>{ caConsolide[i]+=(v||0); });
  });

  const maxV=Math.max(...caConsolide,1);
  const total12=caConsolide.reduce((s,v)=>s+v,0);
  const svgW=1160, svgH=440;
  const barW=70, startX=60, chartH=300, baseY=330;

  let bars="", axes="";
  // Graduations
  [0,25,50,75,100].forEach(p=>{
    const y=baseY-p/100*chartH;
    const v=Math.round(maxV*p/100/1000);
    axes+=`<line x1="${startX}" y1="${y}" x2="${svgW-20}" y2="${y}" stroke="#DDE3F0" stroke-width="0.5"/>`;
    if(v>0) axes+=`<text x="${startX-6}" y="${y+4}" font-size="9" fill="#9CA3AF" text-anchor="end">${v}k</text>`;
  });

  const spacing=Math.floor((svgW-startX-20)/12);
  caConsolide.forEach((v,i)=>{
    const bh=v>0?Math.round(v/maxV*chartH):4;
    const x=startX+i*spacing+4;
    const y=v>0?baseY-bh:baseY-4;
    const col=v>0?"#0A1E6E":"#DDE3F0";
    bars+=`<rect x="${x}" y="${y}" width="${barW}" height="${bh}" fill="${col}" rx="3"/>`;
    if(v>0) bars+=`<text x="${x+barW/2}" y="${y-7}" text-anchor="middle" font-size="10" font-weight="700" fill="#0A1E6E">${Math.round(v/1000)}k€</text>`;
    bars+=`<text x="${x+barW/2}" y="${baseY+16}" text-anchor="middle" font-size="10" fill="#6B7BA4">${MOIS[i]}</text>`;
  });

  // Stats
  const nonZero=caConsolide.filter(v=>v>0);
  const avg=nonZero.length?nonZero.reduce((s,v)=>s+v,0)/nonZero.length:0;
  const maxM=Math.max(...caConsolide);
  const minM=Math.min(...caConsolide.filter(v=>v>0),Infinity);
  const maxIdx=caConsolide.indexOf(maxM);
  const minIdx=caConsolide.findIndex(v=>v===minM);

  // Ligne moyenne
  const avgY=baseY-avg/maxV*chartH;
  bars+=`<line x1="${startX}" y1="${avgY}" x2="${svgW-20}" y2="${avgY}" stroke="#00C2CB" stroke-width="1.5" stroke-dasharray="6,3"/>`;
  bars+=`<text x="${svgW-18}" y="${avgY-4}" font-size="9" fill="#00C2CB" text-anchor="end">Moy. ${Math.round(avg/1000)}k€</text>`;

  const body=`
    <svg viewBox="0 0 ${svgW} ${svgH}" style="width:100%;height:80%;font-family:Inter,sans-serif">${axes}${bars}</svg>
    <div style="display:flex;gap:16px;font-family:Inter,sans-serif;font-size:11px;color:#2C3566;margin-top:4px">
      <span>📊 Total : <strong>${Math.round(total12/1000)}k€</strong></span>
      <span>📈 Pic : <strong>${MOIS[maxIdx]} (${Math.round(maxM/1000)}k€)</strong></span>
      <span>📉 Creux : <strong>${minIdx>=0?MOIS[minIdx]+" ("+Math.round(minM/1000)+"k€)":"—"}</strong></span>
      <span>〰 Moy/mois : <strong>${Math.round(avg/1000)}k€</strong></span>
    </div>`;

  return R.slide(R.hdr("Activité Mensuelle","Évolution CA "+answers.exercice,n,total),body,slideFooter(n,total));
}

// ── S BALANCE ÂGÉE ───────────────────────────────────────────────────
function buildSBalance(ents, parsedMap, type, n, total){
  // type = "fourn" ou "clients"
  const COLS=["0-30j","30-60j","60-90j",">90j"];
  const COLS_COLOR=["#22C55E","#F59E0B","#EF4444","#7F1D1D"];
  const field = type==="fourn"?"agedP":"agedR";
  const totField = type==="fourn"?"totAP":"totAR";
  const title = type==="fourn"?"Balance Âgée Fournisseurs":"Balance Âgée Clients";

  const sections = ents.map(ent=>{
    const p=parsedMap[ent.id];
    if(!p||!p[field]) return `<div><div style="font-size:12px;font-weight:700;color:#0A1E6E;border-bottom:2px solid #00C2CB;padding-bottom:4px;margin-bottom:10px">── ${ent.name} ──</div><p style="color:#9CA3AF;font-size:11px">Données non disponibles</p></div>`;
    const aged=p[field];
    const tot=p[totField]||Object.values(aged).reduce((s,v)=>s+v,0);
    const bars=COLS.map((c,i)=>{
      const v=aged[c]||0;
      const pct=tot>0?(v/tot*100).toFixed(0):0;
      const w=tot>0?Math.round(v/tot*600):0;
      return {label:c,v,pct,w,color:COLS_COLOR[i]};
    });

    const svgH=180;
    let svgBars="";
    bars.forEach((b,i)=>{
      const y=20+i*38;
      if(b.v>0){
        svgBars+=`<rect x="80" y="${y}" width="${b.w}" height="26" fill="${b.color}" rx="3"/>`;
        svgBars+=`<text x="${b.w+86}" y="${y+17}" font-size="11" font-weight="600" fill="${b.color}">${b.label}: ${R.gf(Math.round(b.v))}€ (${b.pct}%)</text>`;
      } else {
        svgBars+=`<text x="84" y="${y+17}" font-size="10" fill="#9CA3AF">${b.label}: 0€ (0%)</text>`;
      }

        <rect x="60" y="${svgH-20}" width="12" height="12" fill="${COLS_COLOR[1]}" rx="2"/><text x="76" y="${svgH-10}" font-size="9" fill="#6B7BA4">30-60j</text>

// ── S MASSE SALARIALE ────────────────────────────────────────────────
function buildSMS(ents, parsedSILAE, parsedMap, answers, n, total){
  const gf=R.gf;
  // Prendre SILAE de la première entité avec des données
  let silae=null, entName="";
  ents.forEach(e=>{if(!silae&&parsedSILAE&&parsedSILAE[e.id]){silae=parsedSILAE[e.id];entName=e.name;}});
  if(!silae||!silae.groupes) return "";

  const co=calcConso(ents,parsedMap,answers);
  const CA=co.cCA;
  const groupes=silae.groupes;
  const cats=Object.entries(groupes).map(([k,g])=>({k,g})).filter(x=>x.g&&x.g.etp>0);

  const rows=cats.map((c,i)=>{
    const pctBrut=CA>0?R.pctN(c.g.brut,CA):"N/D";
    const pctChg=CA>0?R.pctN(c.g.cout,CA):"N/D";
    const badge=c.k==="praticiens"?(pctBrut&&parseFloat(pctBrut)<28?"⚠️<28%":parseFloat(pctBrut)>35?"⚠️>35%":"✓"):"";
    return `<tr style="background:${i%2===0?'white':'#EEF1FA'}">
      <td style="padding:6px 10px;font-size:11px;font-weight:600;color:#0A1E6E">${c.g.label||c.k}</td>
      <td style="padding:6px 10px;font-size:11px;text-align:center">${c.g.etp||0}</td>
      <td style="padding:6px 10px;font-size:11px;text-align:right">${gf(Math.round(c.g.brut))}€</td>
      <td style="padding:6px 10px;font-size:11px;text-align:right">${gf(Math.round(c.g.cout))}€</td>
      <td style="padding:6px 10px;font-size:11px;text-align:right;font-weight:700;color:${parseFloat(pctBrut)>35?'#C53030':'#0A1E6E'}">${pctBrut}% ${badge}</td>
      <td style="padding:6px 10px;font-size:11px;text-align:right;color:#6B7BA4">${pctChg}%</td>
    </tr>`;
  }).join("");

  const totBrut=cats.reduce((s,c)=>s+(c.g.brut||0),0);
  const totCout=cats.reduce((s,c)=>s+(c.g.cout||0),0);
  const totETP=cats.reduce((s,c)=>s+(c.g.etp||0),0);

  const body=`
    <table style="width:100%;border-collapse:collapse;margin-bottom:14px;font-family:Inter,sans-serif">
      <thead style="background:#00146E"><tr>
        <th style="padding:7px 10px;font-size:11px;color:white;text-align:left">Catégorie</th>
        <th style="padding:7px 10px;font-size:11px;color:white;text-align:center">ETP</th>
        <th style="padding:7px 10px;font-size:11px;color:white;text-align:right">Sal. brut</th>
        <th style="padding:7px 10px;font-size:11px;color:white;text-align:right">Coût total</th>
        <th style="padding:7px 10px;font-size:11px;color:white;text-align:right">%CA (brut)</th>
        <th style="padding:7px 10px;font-size:11px;color:white;text-align:right">%CA (chargé)</th>
      </tr></thead>
      <tbody>${rows}
        <tr style="background:#EEF1FA;border-top:2px solid #1A3BAA">
          <td style="padding:7px 10px;font-size:11px;font-weight:700;color:#0A1E6E">TOTAL</td>
          <td style="padding:7px 10px;font-size:11px;font-weight:700;text-align:center">${totETP}</td>
          <td style="padding:7px 10px;font-size:11px;font-weight:700;text-align:right">${gf(Math.round(totBrut))}€</td>
          <td style="padding:7px 10px;font-size:11px;font-weight:700;text-align:right">${gf(Math.round(totCout))}€</td>
          <td style="padding:7px 10px;font-size:11px;font-weight:700;text-align:right;color:#0A1E6E">${CA>0?R.pctN(totBrut,CA):"N/D"}%</td>
          <td style="padding:7px 10px;font-size:11px;font-weight:700;text-align:right">${CA>0?R.pctN(totCout,CA):"N/D"}%</td>
        </tr>
      </tbody>
    </table>
    <div style="background:rgba(0,194,203,0.08);border-left:3px solid #00C2CB;border-radius:4px;padding:10px 14px;font-size:11px;color:#2C3566;font-family:Inter,sans-serif">
      MS/CA (brut) : <strong>${CA>0?R.pctN(totBrut,CA):"N/D"}%</strong> | 
      MS/CA (chargé) : <strong>${CA>0?R.pctN(totCout,CA):"N/D"}%</strong> | 
      Benchmark sectoriel : <strong>58-64%</strong> | 
      Praticiens benchmark : <strong>28-32% brut/CA</strong>
    </div>`;

  return R.slide(R.hdr("Masse Salariale (SILAE)","Personnel",n,total),body,slideFooter(n,total));
}

// ── S RATIOS BENCHMARKS ──────────────────────────────────────────────
function buildSRatios(ents, parsedMap, parsedSILAE, answers, n, total){
  const co=calcConso(ents,parsedMap,answers);
  const CA=co.cCA;
  const gf=R.gf;
  
  let pratBrut=0; ents.forEach(e=>{const s=parsedSILAE&&parsedSILAE[e.id];if(s&&s.groupes&&s.groupes.praticiens)pratBrut+=s.groupes.praticiens.brut||0;});
  const dso=()=>{let d=0,c=0;ents.forEach(e=>{const p=parsedMap[e.id];if(p&&p.DSO){d+=p.DSO;c++;}});return c?Math.round(d/c):null;};

  const ratios=[
    {label:"MS/CA",val:CA>0?R.pctN(co.cMS,CA):null,bench:"58–64%",lo:58,hi:64,unit:"%"},
    {label:"Consommables/CA",val:CA>0?R.pctN(Object.values(parsedMap).reduce((s,p)=>s+(p?.achats||0),0),CA):null,bench:"10–18%",lo:10,hi:18,unit:"%"},
    {label:"EBITDA %",val:CA>0?R.pctN(co.cEBITDA,CA):null,bench:"> 10%",lo:10,hi:25,unit:"%"},
    {label:"Praticiens/CA",val:CA>0?R.pctN(pratBrut,CA):null,bench:"28–32%",lo:28,hi:32,unit:"%"},
    {label:"DSO (jours)",val:dso(),bench:"< 15j",lo:0,hi:15,unit:"j"},
  ];

  const svgW=1100, svgH=380;
  const barMaxW=500, rowH=58, startY=20, labelW=180, valX=labelW+barMaxW+20;
  let svgContent="";

  ratios.forEach((r,i)=>{
    const y=startY+i*rowH;
    const val=r.val?parseFloat(r.val):null;
    const inRange=val!==null&&(r.label==="DSO (jours)"?val<=r.hi:val>=r.lo&&val<=r.hi);
    const color=val===null?"#9CA3AF":inRange?"#15803D":"#B45309";
    const barW=val!==null?Math.min(Math.round(Math.abs(val)/r.hi*barMaxW),barMaxW):0;
    const benchW=Math.round(barMaxW*0.8);

    // Fond de barre gris clair
    svgContent+=`<rect x="${labelW}" y="${y+14}" width="${barMaxW}" height="24" fill="#F3F4F6" rx="4"/>`;
    // Zone benchmark
    svgContent+=`<rect x="${labelW+Math.round(r.lo/r.hi*barMaxW)}" y="${y+14}" width="${Math.round((r.hi-r.lo)/r.hi*barMaxW)}" height="24" fill="rgba(34,197,94,0.15)" rx="2"/>`;
    // Barre valeur
    if(val!==null&&barW>0) svgContent+=`<rect x="${labelW}" y="${y+14}" width="${barW}" height="24" fill="${color}" rx="4" opacity="0.9"/>`;
    // Labels
    svgContent+=`<text x="${labelW-8}" y="${y+30}" text-anchor="end" font-size="12" font-weight="600" fill="#0A1E6E">${r.label}</text>`;
    svgContent+=`<text x="${valX}" y="${y+30}" font-size="13" font-weight="700" fill="${color}">${val!==null?val+r.unit:"N/D"}</text>`;
    svgContent+=`<text x="${valX+70}" y="${y+30}" font-size="10" fill="#9CA3AF">${r.bench}</text>`;
    svgContent+=`<text x="${valX+130}" y="${y+30}" font-size="12" fill="${color}">${val===null?"—":inRange?"✓ Optimal":"⚠ Hors cible"}</text>`;
  });

  const body=`<svg viewBox="0 0 ${svgW} ${svgH}" style="width:100%;height:90%;font-family:Inter,sans-serif">${svgContent}</svg>`;
  return R.slide(R.hdr("Ratios vs Benchmarks Sectoriels","Performance",n,total),body,slideFooter(n,total));
}

// ── S GLOSSAIRE ──────────────────────────────────────────────────────
function buildSGlossaire(n, total){
  const terms=[
    ["CA (Chiffre d'Affaires)","Total des recettes générées par l'activité sur l'exercice"],
    ["EBITDA","Résultat avant intérêts, impôts et amortissements — mesure la rentabilité brute de l'activité"],
    ["EBITDAR","EBITDA avant loyers de crédit-bail — pertinent si l'entreprise loue son matériel médical"],
    ["RN (Résultat Net)","Bénéfice ou perte finale après toutes charges, impôts et amortissements"],
    ["FRNG","Fonds de Roulement Net Global — excédent des financements long terme sur les immobilisations"],
    ["BFR","Besoin en Fonds de Roulement — trésorerie nécessaire pour financer le cycle d'exploitation"],
    ["TN (Trésorerie Nette)","Argent disponible = FRNG − BFR"],
    ["CAF","Capacité d'Autofinancement — trésorerie générée par l'exploitation avant investissements"],
    ["DSO","Délai d'encaissement clients en jours — calculé sur créances nettes (hors CPAM non lettrés)"],
    ["DPO","Délai moyen de règlement fournisseurs en jours"],
    ["IS (Impôt sur les Sociétés)","Impôt calculé sur le bénéfice de la société"],
    ["DAP","Dotations aux Amortissements et Provisions — charge comptable d'usure des équipements"],
    ["MS / CA","Part des salaires et charges sociales dans le chiffre d'affaires"],
    ["Interco","Flux financiers entre entités du groupe — éliminés en consolidation"],
    ["DN (Dette Nette)","Dettes financières totales moins la trésorerie disponible"],
    ["CC51","Convention Collective des établissements privés à but non lucratif du secteur sanitaire"],
  ];

  const rows=terms.map((t,i)=>`<tr style="background:${i%2===0?'white':'#EEF1FA'}">
    <td style="padding:6px 12px;font-size:11px;font-weight:600;color:#0A1E6E;width:30%">${t[0]}</td>
    <td style="padding:6px 12px;font-size:11px;color:#2C3566">${t[1]}</td>
  </tr>`).join("");

  const body=`
    <div style="font-size:12px;color:#6B7BA4;margin-bottom:12px;font-family:Inter,sans-serif">Guide de lecture — définitions simplifiées pour tout lecteur</div>
    <table style="width:100%;border-collapse:collapse;font-family:Inter,sans-serif">
      <thead style="background:#00146E"><tr>
        <th style="padding:7px 12px;font-size:11px;color:white;text-align:left">Terme / Abréviation</th>
        <th style="padding:7px 12px;font-size:11px;color:white;text-align:left">Définition simple</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;

  return R.slide(R.hdr("Glossaire des Termes Financiers","Définitions",n,total),body,slideFooter(n,total));
}

  // S12 Consommables — laissé au modèle

  // S13/S14 Bilans
  ents.forEach(e=>slides.push({ id:"bilan_"+e.id, html: buildBilanSlide(e, parsedMap[e.id]) }));
  // S15 FRNG/BFR/TN
  slides.push({ id:"s15", html: buildSFRNG(ents, parsedMap, answers, ++n, total) });
  // S16 Flux tréso — laissé au modèle
  slides.push({ id:"s16", html: null, marker:"FLUX_SLIDE" });
  // S17 BFR cycle — laissé au modèle
  slides.push({ id:"s17", html: null, marker:"BFR_SLIDE" });
  // S18 Masse salariale
  slides.push({ id:"s18", html: buildSMS(ents, parsedSILAE, parsedMap, answers, ++n, total) });
  // S19 Productivité — laissé au modèle
  slides.push({ id:"s19", html: null, marker:"PROD_SLIDE" });
  // S20 Top fournisseurs
  slides.push({ id:"s20", html: buildSTopFourn(ents, parsedMap, answers, ++n, total) });
  // S21 Balance âgée fourn
  slides.push({ id:"s21", html: buildSBalance(ents, parsedMap, "fourn", ++n, total) });
  // S22 Balance âgée clients
  slides.push({ id:"s22", html: buildSBalance(ents, parsedMap, "clients", ++n, total) });
  // S23 Activité mensuelle
  slides.push({ id:"s23", html: buildSActivite(ents, parsedMap, answers, ++n, total) });
  // S24 Endettement — laissé au modèle (dépend PDFs)
  slides.push({ id:"s24", html: null, marker:"DETTE_SLIDE" });
  // S25 Glossaire

  // S27 Disclaimer
  slides.push({ id:"s27", html: buildSDisclaimer(++n, total) });

  return slides;
}

  if(a.groupeTVA!=="Oui"&&tvaPerdue>0){

  lines.push("  NOTE INTERCO : Les flux Asso->SAS (loyers 613, honoraires 622) s'annulent dans le RN consolide.");
  lines.push("  ⚠️ SLIDE 9 CONSOLIDATION — tableau obligatoire :");
  lines.push("  | Entité | CA brut | Éliminations interco 🔄 | CA net consolidé |");

  if(a.schema==="2asso-1sas"){
