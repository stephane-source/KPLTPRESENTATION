    lines.push("  | "+(a.nomAsso1||"Asso1")+" | "+gf(ca1)+" | — | "+gf(ca1)+" |");
    lines.push("  | "+(a.nomAsso2||"Asso2")+" | "+gf(ca2)+" | — | "+gf(ca2)+" |");
    lines.push("  | "+(a.nomSas||"SAS")+" | "+gf(intercoCA)+" | -"+gf(intercoCA)+" 🔄 | 0 |");
    lines.push("  | GROUPE CONSOLIDÉ | "+gf(ca1+ca2+intercoCA)+" | -"+gf(intercoCA)+" | "+gf(ca1+ca2)+" |");
  } else {
    lines.push("  | "+a.nomAsso1+" | "+gf(cCA)+" | — | "+gf(cCA)+" |");
    lines.push("  | "+(a.nomSas||"SAS")+" | "+gf(intercoCA)+" | -"+gf(intercoCA)+" 🔄 | 0 |");
    lines.push("  | GROUPE CONSOLIDÉ | "+gf(cCA+intercoCA)+" | -"+gf(intercoCA)+" | "+gf(cCA)+" |");
  }
  lines.push("  "+(a.groupeTVA==="Oui"?"Groupe TVA ACTIF : flux interco en HT → pas de TVA perdue":"Groupe TVA NON ACTIF : TVA 20% sur "+gf(intercoCA)+"€ = ~"+gf(Math.round(intercoCA*0.2))+"€ de TVA non récupérable (frottement)"));
  lines.push("");
  lines.push("BILAN : un slide de bilan PAR ENTITÉ ("+ST.ents.map(e=>e.name).join(" + ")+"). PAS de bilan consolidé — les bilans individuels sont déjà dans les données BILAN_SLIDE_START/END.");


  // Ratio praticiens/CA ? global + nominatif si saisi
  lines.push("");
  lines.push("=== RATIO PRATICIENS/CA — DONNÉES POUR SLIDE 12 ===");
  var totalPraticiensBrut=0;
  const praticienDetails=[];
  ST.ents.forEach(ent=>{
    const silae=ST.parsedSILAE&&ST.parsedSILAE[ent.id];
    if(silae&&silae.groupes&&silae.groupes.praticiens){
      totalPraticiensBrut+=silae.groupes.praticiens.brut||0;
      silae.groupes.praticiens.details.forEach(d=>{
        const key=ent.id+"__"+d.nom.replace(/\s+/g,"_");
        const caStr=(ST.answers.caPraticiens||{})[key]||"";
        const caNum=Number(caStr.replace(/[\s€]/g,""))||0;
        praticienDetails.push({nom:d.nom,emploi:d.emploi,brut:d.brut,ca:caNum,entite:ent.name});
      });
    }
  });
  if(totalPraticiensBrut>0&&cCA>0){
    lines.push("  Ratio GLOBAL praticiens : sal.brut="+gf(totalPraticiensBrut)+"€ / CA="+gf(cCA)+"€ = "+((totalPraticiensBrut/cCA)*100).toFixed(1)+"% — formule : sal.brut praticiens SILAE / CA consolidé Asso");
    const ratPrat=((totalPraticiensBrut/cCA)*100).toFixed(1);
    lines.push("KPI PRATICIENS/CA = "+ratPrat+"% - AFFICHER CE CHIFFRE EN S3 KPI (sal.brut "+gf(totalPraticiensBrut)+"E / CA "+gf(cCA)+"E)");
  }
  if(praticienDetails.length>0){
    const avecCA=praticienDetails.filter(p=>p.ca>0);
    const sansCA=praticienDetails.filter(p=>p.ca===0);
    if(avecCA.length>0){
      lines.push("  DÉTAIL NOMINATIF PAR PRATICIEN (CA saisi par l'utilisateur) :");
      avecCA.forEach(p=>{
        const ratio=((p.brut/p.ca)*100).toFixed(1);
        const statut=p.brut/p.ca>0.35?"⚠️ PERTE":p.brut/p.ca>0.32?"⚠️ Tension":"✅ Optimal";
        lines.push("    "+p.nom+" ("+p.emploi+") : sal.brut="+gf(p.brut)+"€ | CA="+gf(p.ca)+"€ | ratio="+ratio+"% "+statut);
      });
    }
    if(sansCA.length>0){
      lines.push("  PRATICIENS SANS CA SAISI (ratio = N/D) : "+sansCA.map(p=>p.nom).join(", "));
    }
  } else {
    lines.push("  Détail nominatif par praticien : CA individuel non saisi.");
  // Ratio global avec donn?es FEC + SILAE (toujours calculable)
  if(totalPraticiensBrut>0&&cCA>0){
    lines.push("  → RATIO GLOBAL OBLIGATOIRE (à afficher slide 12) : "+gf(totalPraticiensBrut)+"€ sal.brut praticiens SILAE / "+gf(cCA)+"€ CA consolidé = "+((totalPraticiensBrut/cCA)*100).toFixed(1)+"% — NE PAS afficher N/D pour ce ratio global");
    lines.push("  → Slide 12 : afficher RATIO GLOBAL en grand + tableau catégories SILAE (brut/CA par groupe). CA individuel par praticien = N/D si non saisi.");
  }
  }

  lines.push("");
  lines.push("=== RÉCAPITULATIF INTÉGRITÉ — À VÉRIFIER AVANT CHAQUE CHIFFRE AFFICHÉ ===");
  lines.push("✅ Ce chiffre est dans le bloc 'DÉTAIL COMPTES PAR RACINE' ci-dessus → utiliser");
  lines.push("✅ Ce chiffre est dans les totaux CR/Bilan ci-dessus → utiliser");
  lines.push("✅ Ce chiffre vient du fichier SILAE/Balance/GL transmis → utiliser");
  lines.push("❌ Ce chiffre n'est nulle part dans les données → afficher N/D, jamais inventer");
  lines.push("❌ Ce ratio ne peut pas être calculé avec les données disponibles → afficher N/D");
  lines.push("");
  lines.push("LOGO OBLIGATOIRE SUR TOUTES LES SLIDES Y COMPRIS PAGE DE GARDE :\n- Header de chaque slide (sauf séparateurs) : <img id=\"klogo\" src=\"\" alt=\"KPLT\" style=\"height:32px;width:auto\"> AVEC l'attribut id=\"klogo\" — OBLIGATOIRE\n- Page de garde (SLIDE 1 cover) : <img id=\"klogo\" src=\"\" alt=\"KPLT\" style=\"height:56px;width:auto;display:block;margin:0 auto 24px\"> centré\n⚠️ Ne JAMAIS écrire une autre valeur dans src. Le JS injectera automatiquement le bon logo. Si src est absent ou différent de vide, le logo n'apparaîtra pas.");
  lines.push("Génère maintenant le rapport HTML COMPLET avec TOUTES les slides. Commence DIRECTEMENT par <!DOCTYPE html>. HTML minifié, zéro commentaire. Toutes les slides sont importantes, ne pas bâcler les dernières.");
  const fullPrompt = lines.join("\n");
  // S?curit? absolue : tronquer ? 140k chars max (35k tokens) pour rester sous 200k avec le syst?me
  const MAX_PROMPT_CHARS = 50000; // 80k chars ? 120k tokens (fran?ais = ~1.5 tok/char)
  if(fullPrompt.length > MAX_PROMPT_CHARS){
    console.warn("Prompt tronqué:", fullPrompt.length, "→", MAX_PROMPT_CHARS, "chars");
    return fullPrompt.slice(0, MAX_PROMPT_CHARS) + "\n[DONNÉES TRONQUÉES — FEC trop volumineux]";
  }
  return fullPrompt;
}

function renderStepper(){
  const el=document.getElementById("stepper");
  if(ST.step>=5){el.innerHTML="";return;}
  el.innerHTML=STEPS.map((s,i)=>{
    const done=ST.step>i,active=ST.step===i;
    const bg=done?"var(--G)":active?"var(--B)":"rgba(255,255,255,0.07)";
    const col=(done||active)?"white":"rgba(255,255,255,0.2)";
    return`<div class="step-col"><div class="step-dot" style="background:${bg};color:${col}">${done?"✓":i+1}</div><div class="step-label" style="color:${done?"var(--G)":active?"white":"rgba(255,255,255,0.2)"}">${s}</div></div>`+(i<STEPS.length-1?`<div class="step-line" style="background:${ST.step>i?"var(--G)":"rgba(255,255,255,0.07)"}"></div>`:"");
  }).join("");
}

// ??????????????????????????????????????????????????????????????
// CHECKER QUALIT? ? Score automatique avant affichage
// ??????????????????????????????????????????????????????????????
function checkQualite(html){
  if(!html) return {score:0,slidesTotal:0,slidesOk:0,svgUnclosed:0,emptySlides:0,warnings:[]};
  
  const warnings = [];
  let deductions = 0;

  // 1. Compter les slides
  const slideMatches = html.match(/class="slide[^"]*"/g) || [];
  const slidesTotal = slideMatches.length;
  
  // 2. SVG non ferm?s
  const svgOpen  = (html.match(/<svg/g)||[]).length;
  const svgClose = (html.match(/<\/svg>/g)||[]).length;
  const svgUnclosed = Math.max(0, svgOpen - svgClose);
  if(svgUnclosed > 0){
    deductions += Math.min(2, svgUnclosed * 0.2);
    warnings.push({sev:'err', msg:`${svgUnclosed} graphique(s) SVG non fermé(s) — rendu cassé`, slide:null, fix:false});
  }

  // 3. "Kopilot Finance" pr?sent
  const kfCount = (html.match(/Kopilot Finance/g)||[]).length;
  if(kfCount > 0){
    deductions += 0.3;
    warnings.push({sev:'warn', msg:`"Kopilot Finance" trouvé ${kfCount}× — doit être "KPLT"`, fix:false});
  }

  // 4. Slides vides ou trop courtes
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const slides = doc.querySelectorAll('.slide, [class*="slide"]');
  let slidesOk = 0;
  let emptySlides = 0;
  const slideIssues = [];

  slides.forEach((slide, i) => {
    const txt = (slide.textContent||'').replace(/\s+/g,' ').trim();
    const svgInSlide = slide.querySelectorAll('svg').length;
    const hasContent = txt.length > 200 || svgInSlide > 0;
    
    // Titres des slides
    const h1 = slide.querySelector('h1, .slide-title, [class*="title"]');
    const titleTxt = h1 ? (h1.textContent||'').trim() : '';
    
    if(!hasContent){
      emptySlides++;
      deductions += 0.15;
      slideIssues.push({sev:'err', msg:`S${i+1} "${titleTxt.substring(0,30)||'?'}" — contenu insuffisant (slide vide)`, slide:i+1, fix:true});
    } else {
      slidesOk++;
    }

    // V?rifier SVG ferm?s dans la slide
    const svgO = (slide.innerHTML.match(/<svg/g)||[]).length;
    const svgC = (slide.innerHTML.match(/<\/svg>/g)||[]).length;
    if(svgO > svgC){
      slideIssues.push({sev:'err', msg:`S${i+1} "${titleTxt.substring(0,30)||'?'}" — SVG non fermé`, slide:i+1, fix:true});
    }

    // Lignes avec seulement "?"
    const tds = slide.querySelectorAll('td');
    let dashRows = 0;
    tds.forEach(td => { if((td.textContent||'').trim()==='—') dashRows++; });
    if(dashRows > 5){
      slideIssues.push({sev:'warn', msg:`S${i+1} — ${dashRows} cellules vides "—" (données manquantes)`, slide:i+1, fix:false});
    }

    // Logo pr?sent
    const hasLogo = slide.querySelector('#klogo, img[alt*="Kopilot"], img[alt="KPLT"]');
    if(!hasLogo && i > 0){
      slideIssues.push({sev:'warn', msg:`S${i+1} "${titleTxt.substring(0,30)||'?'}" — logo absent`, slide:i+1, fix:false});
    }

    // Pagination footer
    const footer = slide.querySelector('.footer, [class*="footer"]');
    if(footer){
      const ft = (footer.textContent||'').trim();
      if(!/\d+\s*\/\s*\d+/.test(ft)){
        deductions += 0.05;
        slideIssues.push({sev:'warn', msg:`S${i+1} — pagination absente dans le footer`, slide:i+1, fix:false});
      }
    }
  });

  // Ajouter les issues slides
  warnings.push(...slideIssues.slice(0, 15)); // max 15 pour la lisibilit?

  // 5. Glossaire pr?sent
  if(!html.includes('Glossaire') && !html.includes('glossaire')){
    deductions += 0.3;
    warnings.push({sev:'warn', msg:'Slide Glossaire absente — ajouter avant le Disclaimer', fix:false});
  }

  // 6. Nombre de slides attendu
  if(slidesTotal < 20){
    deductions += 1.5;
    warnings.push({sev:'err', msg:`Rapport tronqué : ${slidesTotal} slides seulement (attendu ≥ 25)`, fix:false});
  } else if(slidesTotal < 25){
    deductions += 0.5;
    warnings.push({sev:'warn', msg:`${slidesTotal} slides générées — vérifier les slides manquantes`, fix:false});
  }

  // 7. Inter font pr?sente
  if(!html.includes('Inter')){
    deductions += 0.3;
    warnings.push({sev:'warn', msg:'Police Inter non détectée — rendu typographique variable', fix:false});
  }

  // 8. EBITDA pr?sent
  if(!html.includes('EBITDA')){
    deductions += 0.5;
    warnings.push({sev:'err', msg:'EBITDA absent du rapport — slide manquante ?', fix:false});
  }

  // Score final
  const score = Math.max(0, Math.min(10, 10 - deductions));

  return {score, slidesTotal, slidesOk, svgUnclosed, emptySlides, warnings};
}

async function doRegenSlide(slideIdx, slideTitle, modal){
  const instruction = document.getElementById('regen-instruction').value.trim();
  if(!instruction){ document.getElementById('regen-instruction').style.borderColor='#EF4444'; return; }

  const btn = document.getElementById('regen-go');
  const status = document.getElementById('regen-status');
  btn.disabled = true;
  btn.textContent = '⏳ Regénération...';
  status.style.display = 'block';
  status.textContent = 'Envoi à Claude...';

  try{
    // Extraire la slide actuelle
    const parser = new DOMParser();
    const doc = parser.parseFromString(ST.result, 'text/html');
    const slides = doc.querySelectorAll('.slide, [class*="slide"]');
    const currentSlide = slides[slideIdx-1];
    const currentHTML = currentSlide ? currentSlide.outerHTML : '';

    // Extraire le CSS du rapport pour le contexte
    const cssMatch = ST.result.match(/<style>([\s\S]*?)<\/style>/);
    const cssContext = cssMatch ? cssMatch[1].substring(0,800) : '';

    // Pr?parer le prompt de correction
    const systemPrompt = `Tu es un expert en HTML/CSS/SVG pour des présentations financières professionnelles.
Tu reçois une slide HTML existante d'un rapport financier et une instruction de correction.
Tu dois retourner UNIQUEMENT le HTML corrigé de cette slide — rien d'autre.
La slide doit respecter ces contraintes :
- Dimensions : width:1280px;height:720px;max-height:720px;overflow:hidden
- Design system : --navy:#00146E;--bg:#F4F6FB;--card:#FFFFFF;--rowalt:#EEF1FA;font-family:Inter
- Header : linear-gradient(135deg,#001259,#00146E,#1A3BAA);height:72px — avec logo <img id="klogo" src="" alt="KPLT" style="height:32px">
- Footer : background:#00146E;height:36px — "Confidentiel — KPLT" à gauche, numéro slide à droite
- Tout SVG DOIT être fermé avec </svg>
- Retourner UNIQUEMENT le HTML de la div.slide — pas de DOCTYPE, pas de <html>, pas de <style>`;

    const userMsg = `Slide actuelle (S${slideIdx} — ${slideTitle}) :
\`\`\`html
${currentHTML.substring(0, 8000)}
\`\`\`

CSS de référence :
\`\`\`css
${cssContext}
\`\`\`

Instruction de correction :
${instruction}

Retourne UNIQUEMENT le HTML corrigé de cette slide.`;

    status.textContent = 'Claude génère la correction...';

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 8000,
        system: systemPrompt,
        messages: [{role:'user', content: userMsg}]
      })
    });

    if(!resp.ok) throw new Error('API error ' + resp.status);
    const data = await resp.json();
    const newSlideHTML = (data.content?.[0]?.text || '').trim();

    if(!newSlideHTML || newSlideHTML.length < 100){
      throw new Error('Réponse vide ou trop courte');
    }

    // Extraire juste le HTML de la slide (enlever ?ventuelles balises markdown)
    let cleanHTML = newSlideHTML
      .replace(/^```html\s*/i, '')
      .replace(/^```\s*/i, '')
      .replace(/\s*```$/i, '')
      .trim();

    // Remplacer la slide dans ST.result
    // Trouver et remplacer la slide par son index dans le HTML original
    const allSlides = [];
    const slideRegex = /<div[^>]*class="slide[^"]*"[^>]*>[\s\S]*?(?=<div[^>]*class="slide|$)/g;
    let m;
    while((m = slideRegex.exec(ST.result)) !== null){
      allSlides.push({start: m.index, end: m.index + m[0].length, html: m[0]});
    }

    if(allSlides[slideIdx-1]){
      const target = allSlides[slideIdx-1];
      ST.result = ST.result.substring(0, target.start) + cleanHTML + ST.result.substring(target.end);
      status.textContent = '✓ Slide mise à jour !';
      status.style.color = '#15803D';
      setTimeout(()=>{
        modal.remove();
        // Re-render le rapport
        ST.tab = 'rapport';
        renderTab();
      }, 800);
    } else {
      throw new Error('Impossible de localiser la slide ' + slideIdx + ' dans le rapport');
    }

  }catch(err){
    console.error('Regen error:', err);
    status.textContent = '✗ Erreur : ' + err.message;
    status.style.color = '#C53030';
    btn.disabled = false;
    btn.textContent = '🔄 Regénérer cette slide';
  }
}

function changeZoom(delta){
  ST.zoom=Math.max(0.2,Math.min(1,ST.zoom+delta));
  const z=ST.zoom;
  const fr=document.getElementById("rframe");
  const inner=document.getElementById("rapport-inner");
  if(fr){fr.style.transform=`scale(${z})`;}
  if(inner){inner.style.width=Math.round(1280*z)+"px";}
  const zv=document.getElementById("zoom-val");
  if(zv)zv.textContent=Math.round(z*100)+"%";
}

function exportRapport(){
  if(!ST.result){alert("Aucun rapport à exporter.");return;}

  // M?thode 1 ? Blob (Desktop Chrome/Firefox)
  try{
    const blob=new Blob([ST.result],{type:"text/html;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download="kopilot-rapport.html";
    a.style.display="none";
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},2000);
    return;
  }catch(e1){console.warn("Blob failed",e1);}

  // M?thode 2 ? Nouvel onglet avec write (Safari iOS/macOS)
  try{
    const w=window.open("","_blank");
    if(w&&!w.closed){
      w.document.open();
      w.document.write(ST.result);
      w.document.close();
      return;
    }
  }catch(e2){console.warn("window.open failed",e2);}

  // M?thode 3 ? Afficher un lien data URI ? cliquer manuellement
  showExportModal();
}

function buildIaContext(){
  const gf=v=>Math.round(v||0).toLocaleString("fr-FR");
  const pct=(a,b)=>b?((a/b)*100).toFixed(1)+"%":"—";
  let ctx=`Tu es expert-comptable Big 4, cabinet KOPILOT. Tu as accès à TOUTES les données financières ci-dessous issues du dossier en cours.
Profil : ${ST.profile||"Générique"} | Exercice : ${ST.answers.exercice||"non précisé"}
Porteur : ${ST.answers.porteurType} | Retraitement dirigeant : ${ST.answers.retraitDir}
Réponds de façon précise et chiffrée en t'appuyant sur les données disponibles. Ne dis jamais que tu n'as pas accès aux données — tout est ci-dessous.\n\n`;

  ST.ents.forEach(ent=>{
    ctx+=`════ ENTITÉ : ${ent.name||"—"}${ent.siren?" (SIREN "+ent.siren+")":""} ════\n`;
    const p=ST.parsed[ent.id];
    if(p){
      ctx+=`── COMPTE DE RÉSULTAT ──\n`;
      ctx+=`CA: ${gf(p.CA)}€ | Achats: ${gf(p.achats)}€ | Charges ext: ${gf(p.chargesExt)}€\n`;
      ctx+=`Marge brute: ${gf(p.MB)}€ (${pct(p.MB,p.CA)})\n`;
      ctx+=`Impôts/taxes: ${gf(p.impots)}€ | Salaires bruts: ${gf(p.salaires)}€ | Charges soc: ${gf(p.chargesSoc)}€ | MS totale: ${gf(p.ms)}€ (${pct(p.ms,p.CA)})\n`;
      ctx+=`EBE: ${gf(p.EBE)}€ (${pct(p.EBE,p.CA)}) | Amort: ${gf(p.dotAmort)}€ | EBIT: ${gf(p.EBIT)}€\n`;
      ctx+=`Prod fin: ${gf(p.prodFin)}€ | Chg fin: ${gf(p.chgFin)}€ | REX: ${gf(p.REX)}€\n`;
      ctx+=`Prod excep: ${gf(p.prodExcep)}€ | Chg excep: ${gf(p.chgExcep)}€ | IS: ${gf(p.IS)}€ | RN: ${gf(p.RN)}€\n`;
      ctx+=`CAF: ${gf(p.CAF)}€\n\n`;
      ctx+=`── BILAN ACTIF (total: ${gf(p.actifTotal)}€) ──\n`;
      ctx+=`Immo incorp nettes: ${gf(p.imoIncorpB)}€ | Immo corp nettes: ${gf(p.imoCorpB)}€ | Immo fin: ${gf(p.imoFinB)}€ | Amort cumulés: ${gf(p.imoAmortB)}€\n`;
      ctx+=`→ Actif immobilisé net: ${gf(p.actiImmoNet)}€\n`;
      ctx+=`Stocks: ${gf(p.stocksB)}€ | Créances clients: ${gf(p.creancesCliB)}€ | Autres créances: ${gf(p.autresCreancesB)}€ | Tréso: ${gf(p.dispoB)}€\n\n`;
      ctx+=`── BILAN PASSIF (total: ${gf(p.passifTotal)}€) ──\n`;
      ctx+=`Capital: ${gf(p.capitalB)}€ | Réserves: ${gf(p.reservesB)}€ | RAN: ${gf(p.rAnB)}€ | Résultat: ${gf(p.rnB)}€ | Subv: ${gf(p.subvB)}€\n`;
      ctx+=`→ Capitaux propres: ${gf(p.cpTot)}€\n`;
      ctx+=`Provisions: ${gf(p.provB)}€ | Dettes fin (empr+découv): ${gf(p.dettesFinB)}€\n`;
      ctx+=`Fournisseurs: ${gf(p.fournissB)}€ | Dettes sociales: ${gf(p.dettesSocB)}€ | Dettes fiscales: ${gf(p.dettesFixB)}€ | Autres dettes (CC associés etc): ${gf(p.autresDettesB)}€\n`;
      if(p.bilanEcart!==0)ctx+=`⚠ Écart de bilan: ${gf(p.bilanEcart)}€ (FEC potentiellement incomplet)\n`;
      ctx+=`\n── ÉQUILIBRE FINANCIER ──\n`;
      ctx+=`FRNG: ${gf(p.FRNG)}€ | BFR: ${gf(p.BFR)}€ | TN: ${gf(p.TN)}€\n`;
      ctx+=`DSO: ${p.DSO}j | DPO: ${p.DPO}j\n\n`;
      ctx+=`── ACTIVITÉ MENSUELLE ──\n`;
      if(p.hasCa&&p.caArr.length)ctx+=`CA mensuel: ${p.caArr.map(m=>m.mo+":"+gf(m.v)+"€").join(" | ")}\n`;
      else if(p.chgArr.length)ctx+=`Charges mensuelles (proxy d'activité): ${p.chgArr.map(m=>m.mo+":"+gf(m.v)+"€").join(" | ")}\n`;
      ctx+=`\n── TOP FOURNISSEURS ──\n`;
      p.top15.forEach((f,i)=>ctx+=`${i+1}. ${f.name}: ${gf(f.solde)}€`);
      ctx+=`\n── BALANCE ÂGÉE FOURNISSEURS (total: ${gf(p.totAP)}€) ──\n`;
      ctx+=`0-30j: ${gf(p.agedP["0-30"])}€ | 30-60j: ${gf(p.agedP["30-60"])}€ | 60-90j: ${gf(p.agedP["60-90"])}€ | >90j: ${gf(p.agedP[">90"])}€\n`;
      ctx+=`── BALANCE ÂGÉE CLIENTS (total: ${gf(p.totAR)}€) ──\n`;
      ctx+=`0-30j: ${gf(p.agedR["0-30"])}€ | 30-60j: ${gf(p.agedR["30-60"])}€ | 60-90j: ${gf(p.agedR["60-90"])}€ | >90j: ${gf(p.agedR[">90"])}€\n\n`;
      ctx+=`── ALERTES ──\n${p.alerts.length?p.alerts.join("\n"):"Aucune alerte majeure"}\n`;
    }else{
      ctx+=`[Pas de FEC parsé pour cette entité]\n`;
    }
    // Fichiers texte upload?s
    ["silae","balance","gl"].forEach(sid=>{
      const f=ST.files[ent.id+"__"+sid];
      if(f&&f.data&&f.type==="text"){
        ctx+=`\n── FICHIER ${sid.toUpperCase()} (${f.name}) ──\n`;
        ctx+=f.data.slice(0,2000)+(f.data.length>2000?"\n[...tronqué]":"")+"\n";
      }
    });
    ["bilan","emprunts","plaquette"].forEach(sid=>{
      const keys=Object.keys(ST.files).filter(k=>k.startsWith(ent.id+"__"+sid+"__")||k===ent.id+"__"+sid);
      keys.forEach((k,idx)=>{
        const f=ST.files[k];
        if(f&&f.data&&f.type==="text"){
          ctx+=`\n── FICHIER ${sid.toUpperCase()}${keys.length>1?" #"+(idx+1):""} (${f.name}) ──\n`;
          ctx+=f.data.slice(0,2000)+(f.data.length>2000?"\n[...tronqué]":"")+"\n";
        }
      });
    });
    ctx+="\n";
  });
  if(ST.answers.commentaire)ctx+=`Commentaire cabinet : ${ST.answers.commentaire}\n`;
  return ctx;
}

async function sendIa(q){
  if(!q||!q.trim())return;
  ST.iaHist.push({role:"user",content:q});
  const inp=document.getElementById("ia-input");
  if(inp)inp.value="";
  renderIaHistory();
  // Rebuild context ? chaque appel (donn?es toujours fra?ches)
  const sys=buildIaContext();
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":ST.apiKey||"","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true","anthropic-beta":"pdfs-2024-09-25"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,system:sys,messages:ST.iaHist})});
    const d=await r.json();
    ST.iaHist.push({role:"assistant",content:d.content?.find(b=>b.type==="text")?.text||"Erreur"});
  }catch(e){ST.iaHist.push({role:"assistant",content:"Erreur : "+e.message});}
  renderIaHistory();
}

async function generate(){
  ST.step=5;ST.error="";ST.result="";
  render();

  // Messages de progression toutes les 8 secondes
  const msgs=[
    [8, "Préparation des données…"],
    [15,"Envoi à Claude Sonnet…"],
    [22,"Analyse financière en cours…"],
    [30,"Génération des slides CR & Bilan…"],
    [40,"Slides SIG & Charges…"],
    [50,"Slides Masse salariale & Tiers…"],
    [60,"Slides Balance âgée & Activité…"],
    [70,"Recommandations & mise en forme…"],
    [80,"Finalisation du rapport HTML…"],
    [88,"Presque terminé…"],
  ];
  let mi=0;
  const iv=setInterval(()=>{
    if(mi<msgs.length){
      const [pct,msg]=msgs[mi++];
      const prog=document.getElementById("prog");
      const pmsg=document.getElementById("prog-msg");
      if(prog)prog.style.width=pct+"%";
      if(pmsg)pmsg.textContent=msg;
    }
  },8000);

  // Vérifier la clé API
  if(!ST.apiKey||!ST.apiKey.startsWith("sk-ant-")){
    ST.error="🔑 Clé API manquante.";
    ST.step=3;render();return;
  }

  // ── STREAMING : on reçoit les tokens au fur et à mesure → plus de timeout ──
  let accumulated="";
  let charsReceived=0;

  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":ST.apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true","anthropic-beta":"pdfs-2024-09-25"
      },
      body:(()=>{
        const sys = getSystemPrompt();
        const uc = buildUserContent();
        const ucText = uc.map(b=>typeof b==="string"?b:(b.text||"")).join("");
        const sysTokensEst = Math.round(sys.length/4);
        const ucTokensEst = Math.round(ucText.length/4);
        console.warn("PROMPT SIZE ESTIMATE — sys:",sysTokensEst,"tokens | user:",ucTokensEst,"tokens | TOTAL:",sysTokensEst+ucTokensEst,"tokens");
        // Afficher dans l'interface
        const pmsg=document.getElementById("prog-msg");
        if(pmsg) pmsg.textContent="Contexte: ~"+(sysTokensEst+ucTokensEst)+"k tokens estimés (sys:"+sysTokensEst+" + data:"+ucTokensEst+")";
        // TRONCATURE DURE : limiter le texte utilisateur à 120k chars max (≈ 150k tokens)
        const MAX_CHARS = 50000; // 50k chars ≈ 75k tokens — largement sous 200k
        const ucFinal = uc.map(b=>{
          if(b.type==="text" && b.text.length > MAX_CHARS){
            console.warn("Prompt tronqué:",b.text.length,"→",MAX_CHARS,"chars");
            return {type:"text", text: b.text.slice(0, MAX_CHARS)+"\n[TRONQUÉ]"};
          }
          return b;
        });
        const sysFinal = sys.length > 20000 ? sys.slice(0,20000)+"\n[SYS TRONQUÉ]" : sys;
        return JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:64000,
          stream:true,
          system:sysFinal,
          messages:[{role:"user",content:ucFinal}]
        });
      })()
    });

    if(!r.ok){
      const err=await r.json().catch(()=>({}));
      throw new Error("Erreur API : "+(err.error?.message||r.status));
    }

    clearInterval(iv);

    // Lire le stream SSE ligne par ligne
    const reader=r.body.getReader();
    const decoder=new TextDecoder();
    let buffer="";

    while(true){
      const {done,value}=await reader.read();
      if(done)break;
      buffer+=decoder.decode(value,{stream:true});
      const lines=buffer.split("\n");
      buffer=lines.pop()||"";

      for(const line of lines){
        if(!line.startsWith("data:"))continue;
        const data=line.slice(5).trim();
        if(data==="[DONE]")continue;
        try{
          const evt=JSON.parse(data);
          // Extraire le texte des événements de type content_block_delta
          if(evt.type==="content_block_delta"&&evt.delta?.type==="text_delta"){
            accumulated+=evt.delta.text;
            charsReceived+=evt.delta.text.length;
            // Mettre à jour la barre de progression (estimation : ~200k chars max)
            const estPct=Math.min(95,Math.round(10+(charsReceived/180000)*85));
            const prog=document.getElementById("prog");
            const pmsg=document.getElementById("prog-msg");
            if(prog)prog.style.width=estPct+"%";
            if(pmsg)pmsg.textContent="Génération… "+Math.round(charsReceived/1000)+"k caractères reçus";
          }
          // Détecter la fin
          if(evt.type==="message_stop"){
            break;
          }
          // Détecter les erreurs dans le stream
          if(evt.type==="error"){
            throw new Error("Erreur stream : "+evt.error?.message);
          }
        }catch(parseErr){/* ignorer les lignes non-JSON */}
      }
    }

    // Traiter le résultat final
    let html=accumulated.replace(/^```html\n?/,"").replace(/\n?```$/,"").trim();
    if(!html||html.length<100)throw new Error("Réponse vide ou trop courte — réessayez");
    if(!html.startsWith("<!"))throw new Error("Format inattendu — réessayez");

    // ── Post-processing CSS variables (modèle omet parfois var()) ──────────
    html=html.replace(/<style(\b[^>]*)>([\s\S]*?)<\/style>/gi,(match,attrs,css)=>{
      // Remplacer --varname par var(--varname) partout sauf dans les déclarations :root{}
      const fixedCss=css.replace(/(?<![-\w]):(\s*)(--(?:navy2?|blue1|bg|card|rowalt|border|dark|slate|ok|warn|ko)\b)/g,':$1var($2)');
      return '<style'+attrs+'>'+fixedCss+'</style>';
    });
    // Aussi corriger dans les attributs style=""
    html=html.replace(/style="([^"]*)"/gi,(match,styleContent)=>{
      const fixed=styleContent.replace(/(?<![-\w]):(\s*)(--(?:navy2?|blue1|bg|card|rowalt|border|dark|slate|ok|warn|ko)\b)/g,':$1var($2)');
      return 'style="'+fixed+'"';
    });

    // Injecter logo dans tous les img#klogo (y compris page de garde)
    const logoSrc=typeof KOPILOT_LOGO_B64!=="undefined"?KOPILOT_LOGO_B64:"";
    if(logoSrc){
      // 1. Cibler img avec id="klogo" — forcer src sur TOUTES les occurrences
      html=html.replace(/<img([^>]*)id=["']klogo["']([^>]*)>/gi,(m,b,a)=>{
        const cleanB=b.replace(/\s*src\s*=\s*["'][^"']*["']/gi,'');
        const cleanA=a.replace(/\s*src\s*=\s*["'][^"']*["']/gi,'');
        return '<img'+cleanB+'id="klogo"'+cleanA+' src="'+logoSrc+'">';
      });
      // 1b. Aussi chercher src="" ou src='' vides sur img#klogo (cas où src est déjà présent mais vide)
      html=html.replace(/(<img[^>]*id=["']klogo["'][^>]*)src=["']["']/gi,(m,before)=>{
        return before+'src="'+logoSrc+'"';
      });
      // 2. Aussi cibler img avec alt contenant "Kopilot" ou "KPLT" mais sans id klogo
      html=html.replace(/<img([^>]*alt=["'][^"']*(?:[Kk]opilot|KPLT)[^"']*["'][^>]*)>/gi,(m,attrs)=>{
        if(attrs.includes('id="klogo"')||attrs.includes("id='klogo'"))return m; // déjà traité
        const cleaned=attrs.replace(/\s*src\s*=\s*["'][^"']*["']/gi,'');
        return '<img id="klogo"'+cleaned+' src="'+logoSrc+'">';
      });
      // 3. Passe finale : img sans src ou src="" dans les headers de slide
      html=html.replace(/<img([^>]*?)src=["']['"]["']([^>]*)>/gi,(m,b,a)=>{
        // Seulement dans les headers (recherche limitée au contexte header)
        if(b.includes('height:32')||b.includes('height:56')||b.includes('height:48')){
          return '<img'+b+'src="'+logoSrc+'"'+a+'>';
        }
        return m;
      });
    }

    // S'assurer que les slides bilan inline ont bien page-break-after:always
    html = html.replace(
      /(<div style="width:1280px;min-height:720px[^"]*")[^>]*>/g,
      (m) => m.includes('page-break-after') ? m : m.replace('>', ';page-break-after:always">')
    );
    // ══════════════════════════════════════════════════════════════
    // POST-PROCESSING QUALITÉ — PASSE AUTOMATIQUE AVANT AFFICHAGE
    // ══════════════════════════════════════════════════════════════

    // PP-JS — Injecter les slides générées côté JS dans le HTML du modèle
    (function injectJSSlides(){
      try {
        const jsSlides = buildJSSlides(ST.ents, ST.parsed, ST.parsedSILAE, ST.answers);
        // Remplacer les marqueurs laissés par le modèle par les slides JS
        jsSlides.forEach(s=>{
          if(s.html && s.marker){
            // Remplacer le marqueur dans le HTML
            html = html.replace(new RegExp(`<!--\s*${s.marker}\s*-->`, 'g'), s.html);
          } else if(s.html && !s.marker){
            // Les slides JS pures sont injectées via CHARGES_SLIDE_START pattern déjà géré
            // ou via les blocs BILAN_SLIDE_START/END
          }
        });

        // Reconstruire le rapport complet avec slides JS en tête
        // Trouver le body du HTML généré par le modèle
        const bodyMatch = html.match(/<body[^>]*>([\s\S]*)<\/body>/i);
        if(bodyMatch){
          const modelBody = bodyMatch[1];
          // Extraire les slides modèle (marqueurs résolus + slides narratives)
          const modelSlides = modelBody.match(/<div[^>]*class="slide[^"]*"[\s\S]*?(?=<div[^>]*class="slide|$)/g)||[];
          
          // Slides JS complètes dans l'ordre
          const jsOnlySlides = jsSlides.filter(s=>s.html&&!s.marker).map(s=>s.html);
          
          // Pour l'instant : on laisse le HTML du modèle tel quel
          // et on remplace juste les slides JS pré-calculées via marqueurs
        }
      } catch(e){
        console.warn("injectJSSlides error:", e.message);
      }
    })();

    // PP0 — Supprimer le CA de la cover (ne doit pas apparaître page de garde)
    html = html.replace(/<div[^>]*class="cover-ca[^"]*"[^>]*>[\s\S]{0,200}?<\/div>/gi, '');
    html = html.replace(/<div[^>]*class="[^"]*ca-label[^"]*"[^>]*>[\s\S]{0,200}?<\/div>/gi, '');
    // Supprimer aussi les règles CSS .cover-ca dans le <style>
    html = html.replace(/\.cover-ca[\w-]*\s*\{[^}]*\}/g, '');

    // PP1 — Fermeture automatique SVG non fermés (méthode robuste)
    (function fixUnclosedSVG() {
      let result = '';
      let remaining = html;
      const svgOpenRe = /<svg([^>]*)>/i;
      const svgCloseRe = /<\/svg>/i;
      while (remaining.length > 0) {
        const openMatch = svgOpenRe.exec(remaining);
        if (!openMatch) { result += remaining; break; }
        result += remaining.slice(0, openMatch.index + openMatch[0].length);
        remaining = remaining.slice(openMatch.index + openMatch[0].length);
        // Chercher la fermeture dans les 12000 chars suivants
        const searchZone = remaining.slice(0, 12000);
        const closeMatch = svgCloseRe.exec(searchZone);
        if (!closeMatch) {
          // Pas de fermeture → l'insérer avant la prochaine slide ou div.footer
          const nextSlide = remaining.search(/<div class="slide|class="footer|<!-- SLIDE/i);
          const insertAt = nextSlide > 0 ? Math.min(nextSlide, 8000) : 8000;
          result += remaining.slice(0, insertAt) + '</svg>';
          remaining = remaining.slice(insertAt);
        }
        // sinon laisser le flux naturel continuer
      }
      html = result;
    })();

    // PP2 — Nettoyer les tableaux
    // 2a : Supprimer lignes entièrement vides/tirets
    html = html.replace(/<tr[^>]*>([\s\S]*?)<\/tr>/gi, (match, inner) => {
      const cellContents = (inner.match(/<td[^>]*>([\s\S]*?)<\/td>/gi)||[])
        .map(td => td.replace(/<[^>]+>/g,'').trim());
      const allEmpty = cellContents.length > 0 && cellContents.every(c => c === '' || c === '—' || c === '-' || c === 'N/A');
      return allEmpty ? '' : match;
    });
    // 2b : Remplacer "—" seul dans une cellule par cellule vide (invisible)
    html = html.replace(/<td([^>]*)>\s*—\s*<\/td>/g, '<td$1></td>');
    html = html.replace(/<td([^>]*)>\s*-\s*<\/td>/g, '<td$1></td>');

    // PP3 — Forcer pagination dans les footers sans numéro
    let slideCounter = 0;
    const totalSlides = (html.match(/class="slide[^"]*"/g)||[]).length;
    html = html.replace(/class="footer"[^>]*>([\s\S]*?)<\/div>/g, (match, inner) => {
      slideCounter++;
      // Vérifier si un numéro de slide est déjà présent (sous toutes ses formes)
      if (/\d+\s*\/\s*\d+/.test(inner)) return match; // pagination déjà là
      if (/class="right"/.test(inner)) return match;   // classe right déjà là
      if (/<span[^>]*>\s*\d+\s*<\/span>/.test(inner)) return match; // numéro en span
      // Ajouter pagination si absente
      const hasLeft = inner.includes('Confidentiel') || inner.includes('KPLT');
      if (!hasLeft) return match;
      return match.replace('</div>', '<span class="right" style="color:#00C2CB;font-size:13px;font-weight:700;background:rgba(0,194,203,0.15);padding:2px 8px;border-radius:4px">' + slideCounter + ' / ' + totalSlides + '</span></div>');
    });

    // PP4 — Supprimer lignes FINESS vides dans les tableaux Contexte
    html = html.replace(/<tr[^>]*>[\s\S]*?FINESS[\s\S]*?—[\s\S]*?<\/tr>/gi, (match) => {
      // Si la ligne FINESS n'a que des "—", la supprimer
      const cells = (match.match(/<td[^>]*>([\s\S]*?)<\/td>/gi)||[]).map(td => td.replace(/<[^>]+>/g,'').trim());
      const values = cells.filter(c => c !== 'FINESS' && c !== '');
      const allDash = values.every(v => v === '—' || v === '' || v === '-');
      return allDash ? '' : match;
    });

    // PP5 — Injecter sous-titre entité cyan dans les headers P&L et Bilan si absent
    html = html.replace(/(<h1[^>]*>)(P&L ([^<]+))<\/h1>/g, (match, tag, slideContent, entity) => {
      return tag + slideContent + '</h1><span class="badge">' + entity.trim() + '</span>';
    });

    // PP6 — Injecter lien Google Fonts si absent (garantir Inter)
    if (!html.includes('fonts.googleapis.com') && html.includes('Inter')) {
      html = html.replace('<head>', '<head><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">');
    }

    // PP7 — S'assurer que body a font-family Inter
    if (html.indexOf("font-family") < 0) {
      html = html.replace("<body>", "<body style=\"font-family:Inter,system-ui,sans-serif\">");
    }

    // PP8 — Templates SVG fixes pour les slides critiques
    // ── Structure groupe : améliorer le layout si vide en bas ───────
    // Détecter la slide Structure groupe et vérifier que le SVG est présent
    html = html.replace(/(class="slide[^"]*">[\s\S]{0,300}Structure du Groupe[\s\S]{0,2000}?)(<div[^>]*class="footer)/g,
      (match, body, footer) => {
        // Si le SVG est fermé → OK, sinon fermer
        const opens = (body.match(/<svg/g)||[]).length;
        const closes = (body.match(/<\/svg>/g)||[]).length;
        if(opens > closes){
          return body + '</svg>'.repeat(opens-closes) + footer;
        }
        return match;
      }
    );

    // ── Activité mensuelle : garantir 12 barres complètes ──────────
    html = html.replace(/(<div[^>]*class="slide[^"]*"[^>]*>[\s\S]{0,500}Activité Mensuelle[\s\S]{0,200}<svg[^>]*>)([\s\S]*?)(<\/div>\s*<div[^>]*class="footer)/gi,
      (match, before, svgContent, after) => {
        // Compter les mois présents
        const mois = ['JAN','FÉV','MAR','AVR','MAI','JUN','JUL','AOÛ','SEP','OCT','NOV','DÉC'];
        const presentCount = mois.filter(m => svgContent.includes(m)).length;
        // Si moins de 12 mois et SVG non fermé → fermer proprement
        if(presentCount < 12 || !svgContent.includes('</svg>')){
          return before + svgContent + (svgContent.includes('</svg>') ? '' : '</svg>') + after;
        }
        return match;
      }
    );

    // PP9 — Injecter CSS impact dans le <style> du rapport
    const impactCSS = `
.kpi-value{font-size:32px!important;font-weight:800!important;color:var(--navy)!important;line-height:1!important;margin-bottom:4px!important}
.kpi-label{font-size:11px!important;font-weight:500!important;color:var(--slate)!important;text-transform:uppercase!important;letter-spacing:0.5px!important}
.kpi-card{border-radius:12px!important;padding:20px 18px!important;border-top-width:4px!important;box-shadow:0 2px 8px rgba(0,20,110,0.08)!important}
.header{border-bottom:2px solid rgba(0,194,203,0.4)!important;height:76px!important}
tbody tr.total td{border-top:2px solid var(--navy)!important;font-weight:700!important;color:var(--navy)!important}
.section-title,.slide-section-title{font-size:13px!important;font-weight:700!important;color:var(--navy)!important;text-transform:uppercase!important;letter-spacing:0.5px!important;border-bottom:2px solid #00C2CB!important;padding-bottom:6px!important;margin-bottom:14px!important}
.highlight,.callout{background:rgba(0,194,203,0.1)!important;border-left:3px solid #00C2CB!important;padding:10px 14px!important;border-radius:0 8px 8px 0!important}
.badge-ok{background:#D1FAE5!important;color:#15803D!important;padding:3px 10px!important;border-radius:10px!important;font-size:10px!important;font-weight:700!important}
.badge-warn{background:#FEF3C7!important;color:#B45309!important;padding:3px 10px!important;border-radius:10px!important;font-size:10px!important;font-weight:700!important}
.badge-ko{background:#FEE2E2!important;color:#C53030!important;padding:3px 10px!important;border-radius:10px!important;font-size:10px!important;font-weight:700!important}
`;
    if(html.includes('</style>')){
      html = html.replace('</style>', impactCSS + '</style>');
    }

    // PP10 — Améliorer le background des slides (plus contrasté)
    html = html.replace(/background:#F4F6FB/g, 'background:#F0F2F8');
    html = html.replace(/background:var\(--bg\)/g, 'background:#F0F2F8');

    // PP11 — Rapport reçu
    const sc=(html.match(/page-break-after/g)||[]).length+(html.match(/min-height:720px/g)||[]).length;
    console.log("Rapport reçu:",Math.round(html.length/1000)+"k chars, ~"+sc+" slides détectées");
    ST.result=html;
    const prog=document.getElementById("prog");
    const pmsg=document.getElementById("prog-msg");
    if(prog)prog.style.width="100%";
    if(pmsg)pmsg.textContent="✓ Rapport généré ! ("+Math.round(charsReceived/1000)+"k caractères)";
    setTimeout(()=>{ST.step=6;ST.tab="rapport";render();},600);

  }catch(e){
    clearInterval(iv);
    if(e.message.includes("Failed to fetch")||e.message.includes("NetworkError")){
      ST.error="🌐 Erreur réseau. Vérifiez votre connexion et réessayez.";
    } else {
      ST.error=e.message;
    }
    ST.step=3;render();
  }
}

// Extraction texte PDF via PDF.js (appele apres upload)
async function extractPdfTextIfNeeded(key){
  const f = ST.files[key];
  if(!f || f.type!=="pdf") return;
  const sizeKo = f.sizeKo || 0;
  if(sizeKo <= 80) return; // Petit PDF - garder base64

  try {
    if(!window.pdfjsLib){
      await new Promise((res,rej)=>{
        const s=document.createElement("script");
        s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
        s.onload=()=>{window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";res();};
        s.onerror=rej;
        document.head.appendChild(s);
      });
    }
    const b64 = f.data;
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    const pdf = await window.pdfjsLib.getDocument({data:bytes}).promise;
    let txt = "=== "+f.name+" ===\n";
    for(let pg=1;pg<=Math.min(pdf.numPages,30);pg++){
      const page = await pdf.getPage(pg);
      const tc = await page.getTextContent();
      txt += "-- Page "+pg+" --\n" + tc.items.map(i=>i.str).join(" ") + "\n";
    }
    ST.files[key] = {name:f.name, data:txt, type:"pdf_text", sizeKo:f.sizeKo, pages:pdf.numPages};
    render();
  } catch(e){
    console.warn("PDF extraction failed:", e.message);
  }
}

        const match=p.top20.find(f=>{
          const fn=f.name.toUpperCase();
          // Match si au moins 5 chars en commun ou nom contient
          return nom.length>=4&&(fn.includes(nom)||nom.includes(fn.slice(0,Math.min(fn.length,5))));
        });
        // Aussi chercher dans comptesList 622x
        if(!match&&p.comptesList){
          const fec622=p.comptesList.filter(c=>c.cpt.startsWith("622"));
          // Chercher dans les libellés
        }
        if(match&&!found)found=match;
      });
      if(found){
        ST.answers.dirSocMontantAuto=found.debit||0;
      } else {
        ST.answers.dirSocMontantAuto=0;
      }
      render();
    });
  }

  // ── CALCULATEUR EMPRUNTS ──────────────────────────────────────
  (function initEmpruntsCalc(){
    if(!document.getElementById("emprunts-container"))return;

    // Données sauvegardées
    if(!ST.answers.emprunts||!Array.isArray(ST.answers.emprunts))ST.answers.emprunts=[];

    // Calcul amortissement standard (emprunt ou leasing TTC)
    function calcCRD(montant,tauxAnnuel,nbEch,dateDebut,freq,typeContrat,exercice){
      if(!montant||!nbEch||!dateDebut)return null;
      const clos=new Date(exercice||new Date().getFullYear(),11,31); // 31/12/N
      // Date première échéance
      const parts=dateDebut.split(/[\/\-]/);
      if(parts.length<2)return null;
      const mois=parseInt(parts[0])-1, annee=parseInt(parts[1]);
      if(isNaN(mois)||isNaN(annee))return null;
      let d=new Date(annee,mois,1);

      // Pas entre échéances selon fréquence
      const freqMois=freq==="mensuel"?1:freq==="trimestriel"?3:freq==="semestriel"?6:12;

      // Calcul mensualité
      const r=tauxAnnuel>0?(tauxAnnuel/100/12)*freqMois:0;
      let mensualite;
      if(r===0){
        mensualite=montant/nbEch;
      } else {
        mensualite=montant*r/(1-Math.pow(1+r,-nbEch));
      }

      // Parcourir les échéances jusqu'à clôture
      let crd=montant;
      let k=0;
      while(k<nbEch&&d<=clos){
        const interet=crd*r;
        const amort=mensualite-interet;
        crd-=amort;
        k++;
        d=new Date(d.getFullYear(),d.getMonth()+freqMois,1);
      }
      if(k>=nbEch)return 0; // soldé
      return Math.max(0,Math.round(crd));
    }

    function formatEuro(v){return v===null?"N/D":v.toLocaleString("fr-FR")+"€";}

    function renderLigne(e,idx){
      const ex=parseInt(ST.answers.exercice)||new Date().getFullYear();
      const crd=(e.montant&&e.nbEch&&e.dateDebut&&e.freq)?
        calcCRD(parseFloat(e.montant),parseFloat(e.taux||0),parseInt(e.nbEch),e.dateDebut,e.freq,e.type,ex):null;
      if(e.crdCalcule!==crd){e.crdCalcule=crd;}
      const crdDisplay=crd===null?"—":crd===0?"0€ (soldé)":crd.toLocaleString("fr-FR")+"€";
      const crdColor=crd===null?"#888":crd===0?"#22C55E":"#00C2CB";

      return`<div style="background:rgba(255,255,255,0.04);border:1px solid rgba(0,194,203,0.2);border-radius:8px;padding:14px;margin-bottom:12px" data-idx="${idx}">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <span style="font-size:12px;font-weight:600;color:var(--C)">Ligne ${idx+1}</span>
    <div style="display:flex;align-items:center;gap:12px">
      <span style="font-size:13px;font-weight:700;color:${crdColor}">CRD 31/12/${ex} : ${crdDisplay}</span>
      <button type="button" data-del="${idx}" style="background:transparent;border:1px solid rgba(239,68,68,0.4);color:#EF4444;border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer">✕</button>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:2fr 1fr;gap:8px;margin-bottom:8px">
    <div>
      <label style="font-size:10px;color:rgba(255,255,255,0.5);display:block;margin-bottom:3px">Nature / Référence</label>
      <input class="inp emp-field" data-idx="${idx}" data-k="nom" placeholder="Ex : PGE LCL 20927413" value="${e.nom||""}" style="width:100%">
    </div>
    <div>
      <label style="font-size:10px;color:rgba(255,255,255,0.5);display:block;margin-bottom:3px">Type</label>
      <select class="inp emp-field" data-idx="${idx}" data-k="type" style="width:100%">
        <option value="emprunt" ${(e.type||"emprunt")==="emprunt"?"selected":""}>Emprunt amortissable</option>
        <option value="leasing" ${e.type==="leasing"?"selected":""}>Leasing / CBS (TTC)</option>
        <option value="pge" ${e.type==="pge"?"selected":""}>PGE</option>
      </select>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:8px">
    <div>
      <label style="font-size:10px;color:rgba(255,255,255,0.5);display:block;margin-bottom:3px">Montant initial (€)</label>
      <input class="inp emp-field" data-idx="${idx}" data-k="montant" placeholder="Ex : 50000" value="${e.montant||""}" type="number" min="0" style="width:100%">
    </div>
    <div>
      <label style="font-size:10px;color:rgba(255,255,255,0.5);display:block;margin-bottom:3px">Taux annuel (%)</label>
      <input class="inp emp-field" data-idx="${idx}" data-k="taux" placeholder="Ex : 1.2" value="${e.taux||""}" type="number" min="0" step="0.01" style="width:100%">
    </div>
    <div>
      <label style="font-size:10px;color:rgba(255,255,255,0.5);display:block;margin-bottom:3px">Nb échéances</label>
      <input class="inp emp-field" data-idx="${idx}" data-k="nbEch" placeholder="Ex : 60" value="${e.nbEch||""}" type="number" min="1" style="width:100%">
    </div>
    <div>
      <label style="font-size:10px;color:rgba(255,255,255,0.5);display:block;margin-bottom:3px">1ère échéance (MM/AAAA)</label>
      <input class="inp emp-field" data-idx="${idx}" data-k="dateDebut" placeholder="Ex : 01/2022" value="${e.dateDebut||""}" style="width:100%">
    </div>
    <div>
      <label style="font-size:10px;color:rgba(255,255,255,0.5);display:block;margin-bottom:3px">Fréquence</label>
      <select class="inp emp-field" data-idx="${idx}" data-k="freq" style="width:100%">
        <option value="mensuel" ${(e.freq||"mensuel")==="mensuel"?"selected":""}>Mensuel</option>
        <option value="trimestriel" ${e.freq==="trimestriel"?"selected":""}>Trimestriel</option>
        <option value="semestriel" ${e.freq==="semestriel"?"selected":""}>Semestriel</option>
        <option value="annuel" ${e.freq==="annuel"?"selected":""}>Annuel</option>
      </select>
    </div>
  </div>
</div>`;
    }

    function refreshContainer(){
      const c=document.getElementById("emprunts-container");
      if(!c)return;
      c.innerHTML=ST.answers.emprunts.map(renderLigne).join("");
      // Events sur champs
      c.querySelectorAll(".emp-field").forEach(inp=>{
        inp.addEventListener("input",e=>{
          const idx=parseInt(e.target.dataset.idx),k=e.target.dataset.k;
          ST.answers.emprunts[idx][k]=e.target.value;
          // Recalc CRD
          const ex=parseInt(ST.answers.exercice)||new Date().getFullYear();
          const em=ST.answers.emprunts[idx];
          if(em.montant&&em.nbEch&&em.dateDebut&&em.freq){
            em.crdCalcule=calcCRD(parseFloat(em.montant),parseFloat(em.taux||0),parseInt(em.nbEch),em.dateDebut,em.freq,em.type,ex);
          }
          refreshContainer();
        });
        inp.addEventListener("change",e=>{
          const idx=parseInt(e.target.dataset.idx),k=e.target.dataset.k;
          ST.answers.emprunts[idx][k]=e.target.value;
          const ex=parseInt(ST.answers.exercice)||new Date().getFullYear();
          const em=ST.answers.emprunts[idx];
          em.crdCalcule=calcCRD(parseFloat(em.montant||0),parseFloat(em.taux||0),parseInt(em.nbEch||0),em.dateDebut||"",em.freq||"mensuel",em.type||"emprunt",ex);
          refreshContainer();
        });
      });
      // Boutons supprimer
      c.querySelectorAll("[data-del]").forEach(btn=>{
        btn.addEventListener("click",e=>{
          const idx=parseInt(e.target.dataset.del);
          ST.answers.emprunts.splice(idx,1);
          refreshContainer();
        });
      });
    }

    refreshContainer();

    const btnAdd=document.getElementById("btn-add-emprunt");
    if(btnAdd)btnAdd.addEventListener("click",()=>{
      ST.answers.emprunts.push({nom:"",type:"emprunt",montant:"",taux:"",nbEch:"",dateDebut:"",freq:"mensuel",crdCalcule:null});
      refreshContainer();
    });

    // Recalc si exercice change
    const exInp2=document.getElementById("exercice-inp");
    if(exInp2)exInp2.addEventListener("input",()=>{
      const ex=parseInt(ST.answers.exercice)||new Date().getFullYear();
      ST.answers.emprunts.forEach(em=>{
        if(em.montant&&em.nbEch&&em.dateDebut&&em.freq)
          em.crdCalcule=calcCRD(parseFloat(em.montant),parseFloat(em.taux||0),parseInt(em.nbEch),em.dateDebut,em.freq,em.type,ex);
      });
      refreshContainer();
    });
  })();

  // Step 4 — CA par praticien
  document.querySelectorAll(".ca-prat-inp").forEach(inp=>{
    inp.addEventListener("input",e=>{
      if(!ST.answers.caPraticiens)ST.answers.caPraticiens={};
      ST.answers.caPraticiens[e.target.dataset.key]=e.target.value;
      render();
    });
  });
  const bBackCa=document.getElementById("btn-back-ca");
  if(bBackCa)bBackCa.addEventListener("click",()=>{ST.step=3;render();});
  const bSkipCa=document.getElementById("btn-skip-ca");
  if(bSkipCa)bSkipCa.addEventListener("click",()=>generate());
  const bGenCa=document.getElementById("btn-gen-ca");
  if(bGenCa)bGenCa.addEventListener("click",()=>generate());
}

render();
setTimeout(()=>{const inp=document.getElementById("apikey-input");if(inp&&ST.apiKey)inp.value=ST.apiKey;},100);
</script>
